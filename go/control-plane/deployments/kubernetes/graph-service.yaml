################################################################################
# FILE PATH: control-plane/cmd/graph-service/docker-compose.yml
# Graph Service Docker Compose 配置
################################################################################

version: '3.8'

services:
  graph-service:
    build:
      context: ../../..
      dockerfile: control-plane/cmd/graph-service/Dockerfile
    container_name: graph-service
    hostname: graph-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      # Server
      SERVER_LISTEN_ADDR: ":8084"
      SERVER_READ_TIMEOUT: "15s"
      SERVER_WRITE_TIMEOUT: "60s"
      SERVER_SHUTDOWN_TIMEOUT: "30s"

      # ClickHouse
      CLICKHOUSE_HOSTS: "clickhouse:9000"
      CLICKHOUSE_DATABASE: "traffic"
      CLICKHOUSE_USERNAME: "default"
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_MAX_OPEN_CONNS: "10"
      CLICKHOUSE_MAX_IDLE_CONNS: "5"

      # Redis
      REDIS_ENABLED: "true"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_POOL_SIZE: "10"

      # Cache
      CACHE_ENABLED: "true"
      CACHE_NEIGHBOR_TTL: "5m"
      CACHE_ENTITY_TTL: "5m"
      CACHE_GRAPH_TTL: "2m"
      CACHE_MAX_NODES_PER_ITEM: "500"
      CACHE_MAX_EDGES_PER_ITEM: "1000"

      # Query
      QUERY_MAX_DEPTH: "5"
      QUERY_MAX_NODES: "500"
      QUERY_MAX_NEIGHBORS_PER_HOP: "50"
      QUERY_QUERY_TIMEOUT: "30s"
      QUERY_MAX_CONCURRENT_QUERIES: "10"
      QUERY_MAX_BATCH_EXPLORE_IPS: "10"

      # API
      API_ALLOWED_ORIGINS: "*"
      API_REQUEST_TIMEOUT: "30"

      # Security
      SECURITY_RATE_LIMIT_ENABLED: "true"
      SECURITY_RATE_LIMIT_RPS: "10"
      SECURITY_RATE_LIMIT_WINDOW_SEC: "60"
      SECURITY_ENFORCE_TENANT_ISOLATION: "true"

      # OpenTelemetry
      OTEL_ENABLED: "true"
      OTEL_SERVICE_NAME: "graph-service"
      OTEL_SERVICE_VERSION: "1.0.0"
      OTEL_ENVIRONMENT: "development"
      OTEL_ENDPOINT: "otel-collector:4317"
      OTEL_INSECURE: "true"
      OTEL_SAMPLE_RATE: "1.0"

      # Audit
      AUDIT_ENABLED: "true"
      AUDIT_TOPIC: "audit.logs"
      AUDIT_BACKUP_ENABLED: "true"
      AUDIT_BACKUP_DIR: "/var/log/audit"

      # Kafka
      KAFKA_BROKERS: "kafka:9092"

      # Auth (ignored as per instruction)
      AUTH_ENABLED: "false"

      # Logging
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
      ENVIRONMENT: "development"

    volumes:
      - audit-logs:/var/log/audit
    
    depends_on:
      - clickhouse
      - redis
      - kafka
    
    networks:
      - graph-network
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse
    hostname: clickhouse
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: "traffic"
      CLICKHOUSE_USER: "default"
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks:
      - graph-network

  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - graph-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      - zookeeper
    networks:
      - graph-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - graph-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.89.0
    container_name: otel-collector
    hostname: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    networks:
      - graph-network

volumes:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  zookeeper-data:
  zookeeper-logs:
  audit-logs:

networks:
  graph-network:
    driver: bridge