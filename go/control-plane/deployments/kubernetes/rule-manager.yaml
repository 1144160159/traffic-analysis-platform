apiVersion: v1
kind: Service
metadata:
  name: rule-manager
  namespace: traffic-analysis
spec:
  selector:
    app: rule-manager
  ports:
    - name: http
      port: 8082
      targetPort: 8082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-manager
  namespace: traffic-analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rule-manager
  template:
    metadata:
      labels:
        app: rule-manager
    spec:
      containers:
      - name: rule-manager
        image: registry.example.com/traffic/rule-manager:latest
        ports:
        - containerPort: 8082
        env:
        - name: POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: dsn
        - name: KAFKA_BROKERS
          value: "kafka-0.kafka:9092,kafka-1.kafka:9092"
        - name: KAFKA_RULE_TOPIC
          value: "rule.updates"
        - name: KAFKA_AUDIT_TOPIC
          value: "audit.logs"
        - name: API_LISTEN_ADDR
          value: ":8082"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"