apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: traffic-analysis
spec:
  selector:
    app: alert-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: traffic-analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
      - name: alert-service
        image: registry.example.com/traffic/alert-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: KAFKA_BROKERS
          value: "kafka-0.kafka:9092,kafka-1.kafka:9092"
        - name: KAFKA_TOPIC
          value: "detections.v1"
        - name: KAFKA_GROUP_ID
          value: "alert-service"
        - name: REDIS_ADDRS
          value: "redis-cluster:6379"
        - name: CLICKHOUSE_DSN
          value: "clickhouse://clickhouse:9000/traffic"
        - name: OPENSEARCH_ADDRS
          value: "http://opensearch:9200"
        - name: OPENSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: opensearch-credentials
              key: username
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: opensearch-credentials
              key: password
        - name: API_LISTEN_ADDR
          value: ":8081"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"