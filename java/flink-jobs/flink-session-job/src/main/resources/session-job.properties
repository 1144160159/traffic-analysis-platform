# ==============================================================================
# Flink Session Job 配置文件（V2 版本）
# ==============================================================================

# ==================== 模式配置 ====================
# window: 使用 EventTimeSessionWindows（兼容模式）
# process: 使用 KeyedProcessFunction（支持 Active Timeout）
session.mode=process

# ==================== Kafka 配置 ====================
kafka.brokers=kafka-bootstrap.middleware.svc:9092

# 输入 Topic：Flow 事件
input.topic=flow.events.v1

# 输出 Topic：Session 事件
output.topic=session.events.v1

# Late Data DLQ Topic
late.data.topic=session.late.v1

# ClickHouse 写入失败 DLQ
ch.dlq.topic=dlq.session.ch.v1

# OpenSearch 写入失败 DLQ
os.dlq.topic=dlq.session.os.v1

# 消费者分组 ID
consumer.group=flink-session-job

# Kafka 消费者高级参数
kafka.fetch.min.bytes=1
kafka.fetch.max.wait.ms=500
kafka.max.poll.records=500
kafka.max.partition.fetch.bytes=1048576
kafka.request.timeout.ms=30000

# ==================== ClickHouse 配置 ====================
clickhouse.url=jdbc:clickhouse://clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123/traffic
clickhouse.database=traffic
clickhouse.table=sessions
flow.raw.sink.enabled=true
flow.raw.clickhouse.table=flows_raw
clickhouse.user=default
clickhouse.password=

# 批量写入配置
clickhouse.batch.size=10000
clickhouse.batch.interval.ms=5000

# 异步写入配置
clickhouse.max.retries=3
clickhouse.thread.pool.size=4
clickhouse.timeout.ms=30000
clickhouse.async.capacity=100

# ==================== OpenSearch 配置 ====================
opensearch.enabled=true
opensearch.hosts=opensearch.middleware.svc
opensearch.port=9200
opensearch.scheme=http
opensearch.index=sessions_v1
opensearch.user=admin
opensearch.password=${OPENSEARCH_ADMIN_PASSWORD}

# 批量写入配置
opensearch.batch.size=1000
opensearch.batch.interval.ms=5000

# ==================== Checkpoint 配置 ====================
checkpoint.path=s3://flink-checkpoints/checkpoints/session-job
checkpoint.interval.ms=60000
checkpoint.timeout.ms=600000
checkpoint.min.pause.ms=30000

# ==================== Session 窗口与 Timeout 配置 ====================
# Idle Timeout（会话空闲超时），单位：毫秒；低延迟验收 profile 使用 5s
session.gap.ms=5000

# Active Timeout（会话最大持续时间），单位：毫秒
active.timeout.ms=1800000

# Watermark 延迟，单位：毫秒
watermark.delay.ms=5000

# 允许迟到时间（0 表示不允许，迟到数据走 Side Output）
allowed.lateness.ms=0

# ==================== State TTL 配置 ====================
state.ttl.ms=1800000
state.ttl.enabled=true

# ==================== 性能配置 ====================
parallelism=12
max.parallelism=128
