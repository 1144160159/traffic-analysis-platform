# ==============================================================================
# Flink Session Job - Docker Compose 配置（本地开发环境）
# ==============================================================================

version: '3.8'

services:
  # ==================== Flink JobManager ====================
  jobmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-session-jobmanager
    hostname: jobmanager
    environment:
      - FLINK_MODE=jobmanager
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager
    ports:
      - "8081:8081"   # Web UI
      - "6123:6123"   # RPC
      - "9250:9250"   # Prometheus Metrics
    volumes:
      - ./target:/opt/flink/usrlib
      - ./conf:/opt/flink/conf
      - ./logs:/opt/flink/log
      - flink-checkpoints:/opt/flink/checkpoints
    command: jobmanager
    networks:
      - flink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/flink/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Flink TaskManager ====================
  taskmanager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flink-session-taskmanager
    hostname: taskmanager
    environment:
      - FLINK_MODE=taskmanager
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
      - FLINK_PROPERTIES=jobmanager.rpc.address: jobmanager
    ports:
      - "6122:6122"   # RPC
      - "9251:9251"   # Prometheus Metrics
    volumes:
      - ./target:/opt/flink/usrlib
      - ./conf:/opt/flink/conf
      - ./logs:/opt/flink/log
      - flink-checkpoints:/opt/flink/checkpoints
    command: taskmanager
    depends_on:
      - jobmanager
    networks:
      - flink-network
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "/opt/flink/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== Kafka (本地测试) ====================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: flink-session-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 12
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - flink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ClickHouse (本地测试) ====================
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: flink-session-clickhouse
    hostname: clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    environment:
      CLICKHOUSE_DB: traffic
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - flink-network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== OpenSearch (本地测试) ====================
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: flink-session-opensearch
    hostname: opensearch
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - flink-network
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Prometheus (监控) ====================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: flink-session-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - flink-network
    restart: unless-stopped
    depends_on:
      - jobmanager
      - taskmanager

  # ==================== Grafana (可视化) ====================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: flink-session-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - flink-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ==================== AlertManager (告警) ====================
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: flink-session-alertmanager
    hostname: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - flink-network
    restart: unless-stopped

# ==================== 网络配置 ====================
networks:
  flink-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ==================== 卷配置 ====================
volumes:
  flink-checkpoints:
    driver: local
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local
  opensearch-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
