# ==============================================================================
# Prometheus 配置文件 - Flink Session Job 监控
# ==============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'flink-session-job'
    environment: 'production'

# ==================== 告警规则 ====================
rule_files:
  - '/etc/prometheus/alerts.yml'

# ==================== AlertManager 配置 ====================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# ==================== 抓取配置 ====================
scrape_configs:
  # ==================== Flink JobManager ====================
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets:
          - 'jobmanager:9250'
        labels:
          component: 'jobmanager'
          job_type: 'session'
    metrics_path: '/'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ==================== Flink TaskManager ====================
  - job_name: 'flink-taskmanager'
    static_configs:
      - targets:
          - 'taskmanager:9251'
        labels:
          component: 'taskmanager'
          job_type: 'session'
    metrics_path: '/'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ==================== ClickHouse ====================
  - job_name: 'clickhouse'
    static_configs:
      - targets:
          - 'clickhouse:9363'
        labels:
          component: 'clickhouse'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ==================== Kafka ====================
  - job_name: 'kafka'
    static_configs:
      - targets:
          - 'kafka:9092'
        labels:
          component: 'kafka'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # ==================== OpenSearch ====================
  - job_name: 'opensearch'
    static_configs:
      - targets:
          - 'opensearch:9200'
        labels:
          component: 'opensearch'
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 30s

  # ==================== Prometheus 自监控 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          component: 'prometheus'
