################################################################################
# FILE PATH: flink-jobs/flink-behavior-job/src/main/resources/behavior-job.properties
################################################################################

# ==============================================================================
# Behavior Detection Job Configuration
# ==============================================================================
# 
# 配置优先级：命令行参数 > 环境变量 > 本配置文件 > 默认值
#
# 环境变量命名规则：将配置键的 "." 替换为 "_" 并大写
# 例如：kafka.brokers -> KAFKA_BROKERS
#
# ==============================================================================

# ==============================================================================
# Kafka 配置
# ==============================================================================

# Kafka Broker 地址列表（逗号分隔）
kafka.brokers=kafka-bootstrap.middleware.svc:9092

# 输入 Topic（FeatureStat 事件）
kafka.input.topic=feature.stat.v1

# 输出 Topic（DetectionBehavior 事件）
kafka.output.topic=detections.behavior.v1

# Consumer Group ID
kafka.group.id=flink-behavior-job

# ==============================================================================
# ClickHouse 配置
# ==============================================================================

# ClickHouse 服务地址（host:port）
clickhouse.url=clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123

# 数据库名称
clickhouse.database=traffic

# 目标表名称
clickhouse.table=detections_behavior

# 用户名
clickhouse.user=default

# 密码
clickhouse.password=

# 批量写入大小
clickhouse.batch.size=5000

# 批量写入间隔（毫秒）
clickhouse.batch.interval.ms=2000

# ==============================================================================
# Checkpoint 配置
# ==============================================================================

# Checkpoint 存储路径
# 集群默认使用本地挂载路径；S3/MinIO 通过 Flink S3 filesystem 插件作为可选文件系统
checkpoint.path=s3://flink-checkpoints/checkpoints/behavior-job

# Checkpoint 间隔（毫秒）
# 建议值：30000-60000（30秒-1分钟）
checkpoint.interval.ms=60000

# Checkpoint 超时时间（毫秒）
checkpoint.timeout.ms=180000

# Checkpoint 最小间隔（毫秒）
checkpoint.min.pause.ms=30000

# ==============================================================================
# 水印配置
# ==============================================================================

# 水印延迟（毫秒）
# 允许的事件乱序时间
watermark.delay.ms=10000

# 允许的延迟时间（毫秒）
# 超过此时间的事件将被丢弃
allowed.lateness.ms=60000

# ==============================================================================
# 性能配置
# ==============================================================================

# 并行度
# 建议设置为 Kafka 分区数的倍数
parallelism=4

# 最大并行度
# 用于 Keyed State 的重新分区
max.parallelism=128

# ==============================================================================
# 模型配置
# ==============================================================================

# 模型文件路径
model.path=/opt/flink/models

# 模型版本
model.version=v1.0

# 启用的模型列表（逗号分隔）
# 可选值：scan, tunnel, dga, encrypted, anomaly, c2, data_exfil, botnet, malware, phishing
model.enabled=scan,tunnel,dga,encrypted,anomaly,c2,data_exfil,botnet,malware,phishing

# 模型热更新检查间隔（毫秒）
# 设置为 0 禁用热更新
model.reload.interval.ms=300000

# 是否启用模型缓存
model.cache.enabled=true

# 模型缓存大小
model.cache.size=1000

# ==============================================================================
# 推理配置
# ==============================================================================

# 是否启用异步推理
# 生产环境建议启用以提高吞吐量
inference.async.enabled=true

# 异步推理超时时间（毫秒）
inference.async.timeout.ms=5000

# 异步推理并发容量
inference.async.capacity=100

# 推理线程数
inference.threads=4

# 批量推理大小
inference.batch.size=32

# ==============================================================================
# 检测配置
# ==============================================================================

# 最小置信度阈值
# 低于此阈值的检测结果将被过滤
detection.min.confidence=0.5

# 高置信度阈值
# 高于此阈值的检测结果将被标记为高置信度
detection.high.confidence=0.8

# 是否启用多标签检测
detection.multi.label=true

# 每次检测最多输出的标签数
detection.max.labels=5

# ==============================================================================
# 各模型阈值配置
# ==============================================================================

# 扫描检测阈值
threshold.scan=0.7

# 隧道检测阈值
threshold.tunnel=0.75

# DGA 检测阈值
threshold.dga=0.8

# 加密流量检测阈值
threshold.encrypted=0.7

# 异常检测阈值
threshold.anomaly=0.6

# C2 通信检测阈值
threshold.c2=0.75

# 数据外泄检测阈值
threshold.data_exfil=0.7

# 僵尸网络检测阈值
threshold.botnet=0.7

# 恶意软件检测阈值
threshold.malware=0.75

# 钓鱼检测阈值
threshold.phishing=0.7

# ==============================================================================
# 调试配置
# ==============================================================================

# 是否打印检测结果到控制台
# 生产环境建议禁用
debug.print=false

# 是否启用指标收集
metrics.enabled=true

# 指标输出间隔（秒）
metrics.interval.seconds=60
