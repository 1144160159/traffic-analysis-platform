################################################################################
# FILE: docker/prometheus.yml
#
# Prometheus 配置文件
# 用于监控 Flink Behavior Detection Job
################################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'behavior-job-local'
    env: 'development'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      timeout: 10s
      api_version: v2

# 告警规则文件
rule_files:
  - "/etc/prometheus/rules/*.yml"

# 抓取配置
scrape_configs:
  #=============================================================================
  # Prometheus 自身监控
  #=============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  #=============================================================================
  # Flink JobManager 监控
  #=============================================================================
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['flink-jobmanager:9249']
        labels:
          component: 'jobmanager'
          job_type: 'behavior-detection'
    metrics_path: /
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  #=============================================================================
  # Flink TaskManager 监控
  #=============================================================================
  - job_name: 'flink-taskmanager'
    static_configs:
      - targets: ['flink-taskmanager:9249']
        labels:
          component: 'taskmanager'
          job_type: 'behavior-detection'
    metrics_path: /
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  #=============================================================================
  # Kafka 监控（如果有 JMX Exporter）
  #=============================================================================
  # - job_name: 'kafka'
  #   static_configs:
  #     - targets: ['kafka:9404']
  #   metrics_path: /metrics

  #=============================================================================
  # ClickHouse 监控
  #=============================================================================
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
        labels:
          component: 'clickhouse'
    metrics_path: /metrics
    scheme: http

  #=============================================================================
  # AlertManager 监控
  #=============================================================================
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    metrics_path: /metrics

  #=============================================================================
  # Docker 容器监控（使用 cAdvisor）
  #=============================================================================
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   metrics_path: /metrics

  #=============================================================================
  # Node Exporter（主机监控）
  #=============================================================================
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   metrics_path: /metrics
