################################################################################
# FILE: docker/prometheus-rules.yml
#
# Prometheus 告警规则配置
# Flink Behavior Detection Job 专用告警规则
#
# 告警级别：
#   - critical: 需要立即处理，影响核心功能
#   - warning: 需要关注，可能发展为严重问题
#   - info: 信息性告警，用于监控趋势
################################################################################

groups:
  #=============================================================================
  # Flink 作业健康告警
  #=============================================================================
  - name: flink_job_health
    interval: 30s
    rules:
      # 作业运行状态
      - alert: FlinkJobNotRunning
        expr: |
          flink_jobmanager_job_uptime == 0
          or absent(flink_jobmanager_job_uptime)
        for: 2m
        labels:
          severity: critical
          component: flink
          job_type: behavior-detection
        annotations:
          summary: "Flink Behavior Detection Job 未运行"
          description: "Behavior Detection Job 已停止运行超过 2 分钟"
          runbook_url: "https://docs.example.com/runbooks/flink-job-not-running"

      # 作业重启告警
      - alert: FlinkJobRestarting
        expr: |
          increase(flink_jobmanager_job_numRestarts[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: flink
          job_type: behavior-detection
        annotations:
          summary: "Flink Job 发生重启"
          description: "Behavior Detection Job 在过去 5 分钟内重启了 {{ $value }} 次"
          runbook_url: "https://docs.example.com/runbooks/flink-job-restarting"

      # 频繁重启告警
      - alert: FlinkJobFrequentRestarts
        expr: |
          increase(flink_jobmanager_job_numRestarts[30m]) > 3
        for: 5m
        labels:
          severity: critical
          component: flink
          job_type: behavior-detection
        annotations:
          summary: "Flink Job 频繁重启"
          description: "Behavior Detection Job 在过去 30 分钟内重启了 {{ $value }} 次，可能存在严重问题"

      # TaskManager 丢失
      - alert: FlinkTaskManagerLost
        expr: |
          flink_jobmanager_numRegisteredTaskManagers < 1
        for: 2m
        labels:
          severity: critical
          component: flink
        annotations:
          summary: "没有可用的 TaskManager"
          description: "当前注册的 TaskManager 数量为 {{ $value }}，作业无法运行"

  #=============================================================================
  # Checkpoint 告警
  #=============================================================================
  - name: flink_checkpoint
    interval: 30s
    rules:
      # Checkpoint 失败
      - alert: FlinkCheckpointFailed
        expr: |
          increase(flink_jobmanager_job_numberOfFailedCheckpoints[10m]) > 0
        for: 1m
        labels:
          severity: warning
          component: flink
          subsystem: checkpoint
        annotations:
          summary: "Flink Checkpoint 失败"
          description: "过去 10 分钟内 Checkpoint 失败了 {{ $value }} 次"

      # Checkpoint 持续失败
      - alert: FlinkCheckpointContinuousFailing
        expr: |
          increase(flink_jobmanager_job_numberOfFailedCheckpoints[30m]) > 3
          and
          increase(flink_jobmanager_job_numberOfCompletedCheckpoints[30m]) == 0
        for: 5m
        labels:
          severity: critical
          component: flink
          subsystem: checkpoint
        annotations:
          summary: "Flink Checkpoint 持续失败"
          description: "过去 30 分钟内所有 Checkpoint 都失败了，可能导致数据丢失"

      # Checkpoint 耗时过长
      - alert: FlinkCheckpointDurationHigh
        expr: |
          flink_jobmanager_job_lastCheckpointDuration / 1000 > 120
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: checkpoint
        annotations:
          summary: "Flink Checkpoint 耗时过长"
          description: "最近一次 Checkpoint 耗时 {{ $value | printf \"%.1f\" }} 秒，超过 120 秒阈值"

      # Checkpoint 大小过大
      - alert: FlinkCheckpointSizeLarge
        expr: |
          flink_jobmanager_job_lastCheckpointSize / 1024 / 1024 / 1024 > 10
        for: 10m
        labels:
          severity: warning
          component: flink
          subsystem: checkpoint
        annotations:
          summary: "Flink Checkpoint 大小过大"
          description: "最近 Checkpoint 大小为 {{ $value | printf \"%.2f\" }} GB，可能影响恢复时间"

  #=============================================================================
  # 吞吐量与延迟告警
  #=============================================================================
  - name: flink_throughput_latency
    interval: 30s
    rules:
      # 吞吐量下降
      - alert: FlinkThroughputDrop
        expr: |
          rate(flink_taskmanager_job_task_numRecordsIn[5m]) 
          < 
          rate(flink_taskmanager_job_task_numRecordsIn[1h] offset 5m) * 0.5
        for: 10m
        labels:
          severity: warning
          component: flink
          subsystem: throughput
        annotations:
          summary: "Flink 吞吐量显著下降"
          description: "当前吞吐量较过去 1 小时平均值下降超过 50%"

      # 吞吐量为零
      - alert: FlinkNoThroughput
        expr: |
          rate(flink_taskmanager_job_task_numRecordsIn[5m]) == 0
        for: 5m
        labels:
          severity: critical
          component: flink
          subsystem: throughput
        annotations:
          summary: "Flink 无数据吞吐"
          description: "过去 5 分钟内没有处理任何记录，请检查上游 Kafka"

      # 处理延迟过高
      - alert: FlinkHighLatency
        expr: |
          flink_taskmanager_job_latency_source_id_operator_id_operator_subtask_index_latency{quantile="0.99"} / 1000 > 30
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: latency
        annotations:
          summary: "Flink 处理延迟过高"
          description: "P99 延迟达到 {{ $value | printf \"%.1f\" }} 秒，超过 30 秒阈值"

      # 严重延迟
      - alert: FlinkCriticalLatency
        expr: |
          flink_taskmanager_job_latency_source_id_operator_id_operator_subtask_index_latency{quantile="0.99"} / 1000 > 120
        for: 5m
        labels:
          severity: critical
          component: flink
          subsystem: latency
        annotations:
          summary: "Flink 处理延迟严重"
          description: "P99 延迟达到 {{ $value | printf \"%.1f\" }} 秒，超过 2 分钟"

  #=============================================================================
  # 反压告警
  #=============================================================================
  - name: flink_backpressure
    interval: 30s
    rules:
      # 反压检测
      - alert: FlinkBackpressureHigh
        expr: |
          avg(flink_taskmanager_job_task_backPressuredTimeMsPerSecond) by (task_name) > 500
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: backpressure
        annotations:
          summary: "Flink 任务反压过高"
          description: "任务 {{ $labels.task_name }} 反压时间占比超过 50%"

      # 严重反压
      - alert: FlinkBackpressureCritical
        expr: |
          avg(flink_taskmanager_job_task_backPressuredTimeMsPerSecond) by (task_name) > 800
        for: 10m
        labels:
          severity: critical
          component: flink
          subsystem: backpressure
        annotations:
          summary: "Flink 任务严重反压"
          description: "任务 {{ $labels.task_name }} 反压时间占比超过 80%，需要立即处理"

      # 输出缓冲区满
      - alert: FlinkOutputBufferFull
        expr: |
          flink_taskmanager_job_task_buffers_outputQueueLength 
          / 
          flink_taskmanager_job_task_buffers_outPoolUsage > 0.9
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: backpressure
        annotations:
          summary: "Flink 输出缓冲区接近满载"
          description: "输出缓冲区使用率超过 90%，可能导致反压"

  #=============================================================================
  # Kafka Consumer 告警
  #=============================================================================
  - name: flink_kafka_consumer
    interval: 30s
    rules:
      # Consumer Lag 过高
      - alert: FlinkKafkaConsumerLagHigh
        expr: |
          sum(flink_taskmanager_job_task_operator_KafkaSourceReader_topic_partition_committedOffset) by (topic)
          - 
          sum(flink_taskmanager_job_task_operator_KafkaSourceReader_topic_partition_currentOffset) by (topic)
          > 100000
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: kafka
        annotations:
          summary: "Kafka Consumer Lag 过高"
          description: "Topic {{ $labels.topic }} 的 Consumer Lag 达到 {{ $value }} 条消息"

      # Consumer Lag 严重
      - alert: FlinkKafkaConsumerLagCritical
        expr: |
          sum(flink_taskmanager_job_task_operator_KafkaSourceReader_topic_partition_committedOffset) by (topic)
          - 
          sum(flink_taskmanager_job_task_operator_KafkaSourceReader_topic_partition_currentOffset) by (topic)
          > 1000000
        for: 10m
        labels:
          severity: critical
          component: flink
          subsystem: kafka
        annotations:
          summary: "Kafka Consumer Lag 严重"
          description: "Topic {{ $labels.topic }} 的 Consumer Lag 超过 100 万条消息，请紧急处理"

  #=============================================================================
  # 资源使用告警
  #=============================================================================
  - name: flink_resources
    interval: 30s
    rules:
      # JVM 堆内存使用率高
      - alert: FlinkJvmHeapUsageHigh
        expr: |
          flink_taskmanager_Status_JVM_Memory_Heap_Used 
          / 
          flink_taskmanager_Status_JVM_Memory_Heap_Max > 0.85
        for: 10m
        labels:
          severity: warning
          component: flink
          subsystem: jvm
        annotations:
          summary: "Flink JVM 堆内存使用率过高"
          description: "TaskManager JVM 堆内存使用率达到 {{ $value | printf \"%.1f\" }}%"

      # JVM 堆内存即将耗尽
      - alert: FlinkJvmHeapUsageCritical
        expr: |
          flink_taskmanager_Status_JVM_Memory_Heap_Used 
          / 
          flink_taskmanager_Status_JVM_Memory_Heap_Max > 0.95
        for: 5m
        labels:
          severity: critical
          component: flink
          subsystem: jvm
        annotations:
          summary: "Flink JVM 堆内存即将耗尽"
          description: "TaskManager JVM 堆内存使用率达到 {{ $value | printf \"%.1f\" }}%，可能导致 OOM"

      # GC 时间过长
      - alert: FlinkGCTimeHigh
        expr: |
          increase(flink_taskmanager_Status_JVM_GarbageCollector_G1_Young_Generation_Time[5m]) / 1000 > 30
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: jvm
        annotations:
          summary: "Flink GC 时间过长"
          description: "过去 5 分钟内 Young GC 累计耗时 {{ $value | printf \"%.1f\" }} 秒"

      # Full GC 频繁
      - alert: FlinkFullGCFrequent
        expr: |
          increase(flink_taskmanager_Status_JVM_GarbageCollector_G1_Old_Generation_Count[10m]) > 5
        for: 5m
        labels:
          severity: critical
          component: flink
          subsystem: jvm
        annotations:
          summary: "Flink Full GC 过于频繁"
          description: "过去 10 分钟内发生了 {{ $value }} 次 Full GC"

      # Metaspace 使用率高
      - alert: FlinkMetaspaceUsageHigh
        expr: |
          flink_taskmanager_Status_JVM_Memory_Metaspace_Used 
          / 
          flink_taskmanager_Status_JVM_Memory_Metaspace_Max > 0.9
        for: 10m
        labels:
          severity: warning
          component: flink
          subsystem: jvm
        annotations:
          summary: "Flink Metaspace 使用率过高"
          description: "Metaspace 使用率达到 {{ $value | printf \"%.1f\" }}%"

  #=============================================================================
  # Behavior Detection 业务告警
  #=============================================================================
  - name: behavior_detection_business
    interval: 60s
    rules:
      # 检测率异常（检测到的威胁比例过低）
      - alert: BehaviorDetectionRateLow
        expr: |
          sum(rate(flink_taskmanager_job_task_operator_detected_count[10m])) 
          / 
          sum(rate(flink_taskmanager_job_task_operator_processed_count[10m])) < 0.001
        for: 30m
        labels:
          severity: info
          component: behavior-detection
          subsystem: model
        annotations:
          summary: "行为检测率异常低"
          description: "过去 30 分钟的检测率低于 0.1%，请检查模型是否正常"

      # 检测率异常（检测到的威胁比例过高）
      - alert: BehaviorDetectionRateHigh
        expr: |
          sum(rate(flink_taskmanager_job_task_operator_detected_count[10m])) 
          / 
          sum(rate(flink_taskmanager_job_task_operator_processed_count[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
          component: behavior-detection
          subsystem: model
        annotations:
          summary: "行为检测率异常高"
          description: "过去 10 分钟的检测率超过 50%，可能存在模型问题或真实攻击"

      # 模型推理错误
      - alert: BehaviorModelInferenceErrors
        expr: |
          sum(rate(flink_taskmanager_job_task_operator_inference_errors[5m])) > 10
        for: 5m
        labels:
          severity: warning
          component: behavior-detection
          subsystem: model
        annotations:
          summary: "模型推理错误率过高"
          description: "每分钟模型推理错误超过 10 次"

      # 推理延迟过高
      - alert: BehaviorModelLatencyHigh
        expr: |
          histogram_quantile(0.99, 
            sum(rate(flink_taskmanager_job_task_operator_inference_duration_bucket[5m])) by (le)
          ) / 1000 > 100
        for: 5m
        labels:
          severity: warning
          component: behavior-detection
          subsystem: model
        annotations:
          summary: "模型推理延迟过高"
          description: "P99 模型推理延迟达到 {{ $value | printf \"%.1f\" }} 毫秒"

  #=============================================================================
  # ClickHouse Sink 告警
  #=============================================================================
  - name: flink_clickhouse_sink
    interval: 30s
    rules:
      # ClickHouse 写入失败
      - alert: FlinkClickHouseSinkErrors
        expr: |
          increase(flink_taskmanager_job_task_operator_clickhouse_sink_errors[5m]) > 0
        for: 2m
        labels:
          severity: warning
          component: flink
          subsystem: clickhouse
        annotations:
          summary: "ClickHouse Sink 写入错误"
          description: "过去 5 分钟内 ClickHouse 写入失败 {{ $value }} 次"

      # ClickHouse 写入延迟
      - alert: FlinkClickHouseSinkLatencyHigh
        expr: |
          flink_taskmanager_job_task_operator_clickhouse_sink_latency_ms > 5000
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: clickhouse
        annotations:
          summary: "ClickHouse Sink 写入延迟过高"
          description: "ClickHouse 写入延迟达到 {{ $value }} 毫秒"

  #=============================================================================
  # Kafka Sink 告警
  #=============================================================================
  - name: flink_kafka_sink
    interval: 30s
    rules:
      # Kafka 发送失败
      - alert: FlinkKafkaSinkErrors
        expr: |
          increase(flink_taskmanager_job_task_operator_kafka_sink_record_send_errors[5m]) > 0
        for: 2m
        labels:
          severity: warning
          component: flink
          subsystem: kafka
        annotations:
          summary: "Kafka Sink 发送错误"
          description: "过去 5 分钟内 Kafka 消息发送失败 {{ $value }} 次"

      # Kafka 发送重试
      - alert: FlinkKafkaSinkRetries
        expr: |
          increase(flink_taskmanager_job_task_operator_kafka_sink_record_send_retries[5m]) > 100
        for: 5m
        labels:
          severity: warning
          component: flink
          subsystem: kafka
        annotations:
          summary: "Kafka Sink 重试过多"
          description: "过去 5 分钟内 Kafka 消息发送重试 {{ $value }} 次"
