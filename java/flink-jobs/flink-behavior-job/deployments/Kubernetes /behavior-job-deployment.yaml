apiVersion: flink.apache.org/v1beta1
kind: FlinkDeployment
metadata:
  name: behavior-detection-job
  namespace: traffic
  labels:
    app: traffic-behavior-job
spec:
  # 镜像：使用前面 Dockerfile 构建的镜像
  image: registry.example.com/traffic/behavior-job:latest
  imagePullPolicy: IfNotPresent

  flinkVersion: v1_17

  flinkConfiguration:
    taskmanager.numberOfTaskSlots: "2"

    # Checkpoint/Savepoint/HAA 存储
    state.checkpoints.dir: "s3://traffic-flink-checkpoints/behavior-job"
    state.savepoints.dir: "s3://traffic-flink-savepoints/behavior-job"
    high-availability: org.apache.flink.kubernetes.highavailability.KubernetesHaServicesFactory
    high-availability.storageDir: "s3://traffic-flink-ha/behavior-job"

    # 关闭 Web UI 认证（按需配置）
    rest.flamegraph.enabled: "true"

    # Prometheus Metrics
    metrics.reporters: prom
    metrics.reporter.prom.class: org.apache.flink.metrics.prometheus.PrometheusReporter
    metrics.reporter.prom.port: "9249"

    # 反压/调优（可按需修改）
    taskmanager.memory.flink.size: "4096m"
    taskmanager.memory.jvm-metaspace.size: "512m"
    taskmanager.memory.process.size: "6144m"

  serviceAccount: flink

  jobManager:
    replicas: 1
    resource:
      cpu: "1"
      memory: "2G"
    podTemplate:
      metadata:
        labels:
          app: traffic-behavior-job
          role: jm
      spec:
        containers:
          - name: flink-main-container
            env:
              # ========== Kafka ==========
              - name: KAFKA_BROKERS
                value: "kafka-0.kafka:9092,kafka-1.kafka:9092"
              - name: KAFKA_INPUT_TOPIC
                value: "feature.stat.v1"
              - name: KAFKA_OUTPUT_TOPIC
                value: "detections.behavior.v1"
              - name: KAFKA_GROUP_ID
                value: "flink-behavior-job"

              # ========== ClickHouse ==========
              - name: CLICKHOUSE_URL
                value: "clickhouse-proxy.traffic:8123"
              - name: CLICKHOUSE_DATABASE
                value: "traffic"
              - name: CLICKHOUSE_TABLE
                value: "detections_behavior_local"
              - name: CLICKHOUSE_USER
                value: "default"
              - name: CLICKHOUSE_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: ch-credentials
                    key: password
                    optional: true

              # ========== Checkpoints ==========
              - name: CHECKPOINT_PATH
                value: "s3://traffic-flink-checkpoints/behavior-job"
              - name: CHECKPOINT_INTERVAL_MS
                value: "60000"

              # ========== 模型配置 ==========
              - name: MODEL_PATH
                value: "/opt/flink/models"
              - name: MODEL_VERSION
                value: "v1.0"
              - name: MODEL_ENABLED
                value: "scan,tunnel,dga,encrypted,anomaly,c2,data_exfil,botnet,malware,phishing"

              # ========== 性能/调试 ==========
              - name: PARALLELISM
                value: "6"
              - name: DEBUG_PRINT
                value: "false"

              # ========== 日志 ==========
              - name: FLINK_LOG_DIR
                value: "/opt/flink/log"

            volumeMounts:
              - name: flink-logs
                mountPath: /opt/flink/log
              - name: flink-checkpoints
                mountPath: /opt/flink/checkpoints

        volumes:
          - name: flink-logs
            emptyDir: {}
          - name: flink-checkpoints
            emptyDir: {}

  taskManager:
    replicas: 3
    resource:
      cpu: "4"
      memory: "8G"
    podTemplate:
      metadata:
        labels:
          app: traffic-behavior-job
          role: tm
      spec:
        containers:
          - name: flink-main-container
            env:
              - name: FLINK_LOG_DIR
                value: "/opt/flink/log"
            volumeMounts:
              - name: flink-logs
                mountPath: /opt/flink/log
              - name: flink-checkpoints
                mountPath: /opt/flink/checkpoints
        volumes:
          - name: flink-logs
            emptyDir: {}
          - name: flink-checkpoints
            emptyDir: {}

  job:
    jarURI: "local:///opt/flink/jobs/behavior-job.jar"
    entryClass: "com.traffic.flink.behavior.BehaviorDetectionJob"
    args: []
    parallelism: 6
    upgradeMode: stateful
    state: running          # 可设为 suspended 做停机保留状态
    savepointTriggerNonce: 0