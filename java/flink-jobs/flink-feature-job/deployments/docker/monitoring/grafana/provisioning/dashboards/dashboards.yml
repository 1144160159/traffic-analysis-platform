# =============================================================================
# Grafana Dashboards Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: 'Flink Feature Job Dashboards'
    orgId: 1
    folder: 'Flink'
    folderUid: 'flink'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
