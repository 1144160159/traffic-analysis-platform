# =============================================================================
# Flink Configuration for Feature Extraction Job
# 针对 2TB 内存 + HDD 存储优化
# =============================================================================

# ==================== 基础配置 ====================
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.bind-host: 0.0.0.0

taskmanager.bind-host: 0.0.0.0
taskmanager.host: taskmanager

# ==================== 并行度配置 ====================
parallelism.default: 4
taskmanager.numberOfTaskSlots: 4

# ==================== 内存配置（针对大内存优化）====================
# JobManager 内存
jobmanager.memory.process.size: 2048m
jobmanager.memory.heap.size: 1536m
jobmanager.memory.off-heap.size: 256m
jobmanager.memory.jvm-metaspace.size: 256m

# TaskManager 内存（针对 2TB 内存节点）
taskmanager.memory.process.size: 8192m
taskmanager.memory.flink.size: 6144m
taskmanager.memory.managed.fraction: 0.4
taskmanager.memory.network.fraction: 0.1
taskmanager.memory.network.min: 128mb
taskmanager.memory.network.max: 1gb
taskmanager.memory.jvm-overhead.fraction: 0.1

# ==================== State Backend（RocksDB 优化）====================
state.backend: rocksdb
state.backend.rocksdb.localdir: /data/flink/rocksdb
state.backend.rocksdb.timer-service.factory: rocksdb
state.backend.rocksdb.checkpoint.transfer.thread.num: 4

# RocksDB 内存优化（利用大内存）
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.fixed-per-slot: 512mb
state.backend.rocksdb.memory.write-buffer-ratio: 0.5
state.backend.rocksdb.memory.high-prio-pool-ratio: 0.1

# RocksDB 针对 HDD 优化
state.backend.rocksdb.predefined-options: SPINNING_DISK_OPTIMIZED_HIGH_MEM
state.backend.rocksdb.compaction.level.use-dynamic-size: true
state.backend.rocksdb.compaction.level.target-file-size-base: 128mb

# ==================== Checkpoint 配置 ====================
execution.checkpointing.interval: 60000
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 120000
execution.checkpointing.min-pause: 30000
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
execution.checkpointing.tolerable-failed-checkpoints: 3

# Checkpoint 存储（可配置为 S3/MinIO）
state.checkpoints.dir: file:///data/flink/checkpoints
state.savepoints.dir: file:///data/flink/savepoints

# ==================== 网络配置 ====================
taskmanager.network.memory.buffers-per-channel: 4
taskmanager.network.memory.floating-buffers-per-gate: 16
taskmanager.network.sort-shuffle.min-parallelism: 8

# ==================== 重启策略 ====================
restart-strategy: fixed-delay
restart-strategy.fixed-delay.attempts: 3
restart-strategy.fixed-delay.delay: 30s

# ==================== Web UI ====================
rest.port: 8081
rest.address: 0.0.0.0
rest.bind-address: 0.0.0.0
web.submit.enable: true
web.cancel.enable: true
web.upload.dir: /data/flink/uploads

# ==================== Metrics（Prometheus）====================
metrics.reporters: prom
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9249
metrics.scope.jm: flink.jobmanager
metrics.scope.tm: flink.taskmanager
metrics.scope.operator: flink.<job_name>.<operator_name>
metrics.scope.task: flink.<job_name>.<task_name>

# 自定义 Metrics 标签
metrics.reporter.prom.groupingKey: "job=feature-job"

# ==================== 高可用配置（生产环境）====================
# 如需 HA，取消以下注释
# high-availability: zookeeper
# high-availability.zookeeper.quorum: zk1:2181,zk2:2181,zk3:2181
# high-availability.zookeeper.path.root: /flink
# high-availability.cluster-id: /feature-job
# high-availability.storageDir: hdfs:///flink/ha/

# ==================== 安全配置 ====================
security.ssl.internal.enabled: false
security.ssl.rest.enabled: false

# ==================== 日志配置 ====================
env.log.dir: /var/log/flink
env.log.max: 10

# ==================== 类加载 ====================
classloader.resolve-order: parent-first
classloader.check-leaked-classloader: false

# ==================== 作业相关配置 ====================
pipeline.auto-generate-uids: true
pipeline.max-parallelism: 128
pipeline.object-reuse: true

# ==================== 调试配置 ====================
akka.ask.timeout: 60s
akka.tcp.timeout: 60s
web.timeout: 120000
