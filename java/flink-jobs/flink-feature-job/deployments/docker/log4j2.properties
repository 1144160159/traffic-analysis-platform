# =============================================================================
# Flink Log4j2 Configuration for Feature Job
# =============================================================================

# Root logger
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.rolling.ref = RollingFileAppender

# ==================== Console Appender ====================
appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{60} - %msg%n

# ==================== Rolling File Appender ====================
appender.rolling.name = RollingFileAppender
appender.rolling.type = RollingFile
appender.rolling.fileName = ${sys:log.file}
appender.rolling.filePattern = ${sys:log.file}.%i
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{60} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 100MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10

# ==================== Flink 内部日志 ====================
logger.flink.name = org.apache.flink
logger.flink.level = INFO

logger.checkpoint.name = org.apache.flink.runtime.checkpoint
logger.checkpoint.level = WARN

logger.state.name = org.apache.flink.runtime.state
logger.state.level = WARN

logger.rocksdb.name = org.apache.flink.contrib.streaming.state
logger.rocksdb.level = WARN

logger.taskexecutor.name = org.apache.flink.runtime.taskexecutor
logger.taskexecutor.level = INFO

# ==================== Kafka 连接器 ====================
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.kafkaclients.name = org.apache.kafka.clients
logger.kafkaclients.level = WARN

# ==================== ClickHouse ====================
logger.clickhouse.name = com.clickhouse
logger.clickhouse.level = WARN

# ==================== PostgreSQL ====================
logger.postgres.name = org.postgresql
logger.postgres.level = WARN

# ==================== 应用日志 ====================
logger.traffic.name = com.traffic.flink
logger.traffic.level = INFO

logger.feature.name = com.traffic.flink.feature
logger.feature.level = INFO

logger.featurecalc.name = com.traffic.flink.feature.calculator
logger.featurecalc.level = DEBUG

logger.processor.name = com.traffic.flink.feature.processor
logger.processor.level = INFO

logger.sink.name = com.traffic.flink.feature.sink
logger.sink.level = INFO

logger.source.name = com.traffic.flink.feature.source
logger.source.level = INFO

# ==================== 关闭冗余日志 ====================
logger.akka.name = akka
logger.akka.level = WARN

logger.netty.name = io.netty
logger.netty.level = WARN

logger.grpc.name = io.grpc
logger.grpc.level = WARN

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = WARN

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN
