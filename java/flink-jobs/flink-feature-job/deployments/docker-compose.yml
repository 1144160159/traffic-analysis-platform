# =============================================================================
# Flink Feature Job - Local Development Docker Compose
# 适用于本地开发和测试环境
# =============================================================================

version: '3.8'

x-flink-common: &flink-common
  image: flink-feature-job:latest
  build:
    context: .
    dockerfile: docker/Dockerfile
  environment: &flink-env
    # Kafka
    KAFKA_BROKERS: kafka:9092
    KAFKA_INPUT_TOPIC: session.events.v1
    KAFKA_OUTPUT_TOPIC: feature.stat.v1
    KAFKA_DLQ_TOPIC: dlq.feature-job
    KAFKA_L2_TRIGGER_TOPIC: l2.trigger.v1
    KAFKA_GROUP_ID: flink-feature-job
    # PostgreSQL
    POSTGRES_URL: jdbc:postgresql://postgres:5432/traffic
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
    # ClickHouse
    CLICKHOUSE_URL: clickhouse:8123
    CLICKHOUSE_DATABASE: traffic
    CLICKHOUSE_TABLE: feature_stat_local
    CLICKHOUSE_USER: default
    CLICKHOUSE_PASSWORD: ""
    # Checkpoint
    CHECKPOINT_PATH: file:///data/flink/checkpoints
    CHECKPOINT_INTERVAL: "60000"
    # Parallelism
    PARALLELISM: "2"
  networks:
    - flink-network
  restart: unless-stopped

services:
  # ==================== Flink JobManager ====================
  jobmanager:
    <<: *flink-common
    container_name: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"    # Web UI
      - "6123:6123"    # RPC
      - "9249:9249"    # Prometheus Metrics
    volumes:
      - flink-checkpoints:/data/flink/checkpoints
      - flink-savepoints:/data/flink/savepoints
      - flink-logs:/var/log/flink
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ==================== Flink TaskManager ====================
  taskmanager:
    <<: *flink-common
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    ports:
      - "9250:9249"    # Prometheus Metrics
    volumes:
      - flink-checkpoints:/data/flink/checkpoints
      - flink-logs:/var/log/flink
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ==================== Job Submitter (One-shot) ====================
  job-submitter:
    <<: *flink-common
    container_name: flink-job-submitter
    command: submit
    depends_on:
      jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: "no"

  # ==================== Kafka ====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - flink-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - flink-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ==================== Kafka Topic Initialization ====================
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'

      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic session.events.v1 --partitions 4 --replication-factor 1

      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic feature.stat.v1 --partitions 4 --replication-factor 1

      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic dlq.feature-job --partitions 2 --replication-factor 1

      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic l2.trigger.v1 --partitions 4 --replication-factor 1

      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - flink-network
    restart: "no"

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - flink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== ClickHouse ====================
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse
    ports:
      - "8123:8123"    # HTTP
      - "9000:9000"    # Native
    environment:
      CLICKHOUSE_DB: traffic
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ./docker/init-clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - flink-network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis (Optional - for caching) ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - flink-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - flink-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - flink-network
    depends_on:
      - prometheus

  # ==================== Kafka UI (Optional) ====================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - flink-network
    depends_on:
      - kafka

# ==================== Networks ====================
networks:
  flink-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== Volumes ====================
volumes:
  flink-checkpoints:
  flink-savepoints:
  flink-logs:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  redis-data:
  prometheus-data:
  grafana-data:
