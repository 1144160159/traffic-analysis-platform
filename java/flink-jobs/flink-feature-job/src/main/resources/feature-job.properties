# Feature Job 生产环境配置 — 集群模式
kafka.brokers=kafka-bootstrap.middleware.svc:9092
kafka.topic.flow=flow.events.v1
kafka.topic.session=session.events.v1
kafka.topic.feature=feature.stat.v1
kafka.group.id=flink-feature-job

# ClickHouse 集群端点
clickhouse.hosts=clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123
clickhouse.database=traffic
clickhouse.user=default
clickhouse.password=

# PostgreSQL 集群 (Primary + Replica)
postgres.url=jdbc:postgresql://postgres-primary.databases.svc:5432/traffic_platform
postgres.user=postgres
postgres.password=${POSTGRES_PASSWORD}

# Checkpoint
checkpoint.interval.ms=60000
checkpoint.timeout.ms=600000

# Parallelism
parallelism=4
state.ttl.hours=2
