################################################################################
# Grafana 数据源自动配置
################################################################################

apiVersion: 1

datasources:
  # Prometheus 数据源
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.48.0"

  # ClickHouse 数据源 (可选，需要安装插件)
  # - name: ClickHouse
  #   type: grafana-clickhouse-datasource
  #   access: proxy
  #   url: http://clickhouse:8123
