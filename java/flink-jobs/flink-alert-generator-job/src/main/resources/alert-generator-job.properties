################################################################################
FILE PATH: flink-jobs/flink-alert-generator-job/src/main/resources/alert-generator-job.properties
################################################################################

# ==================== Kafka 配置 ====================
kafka.brokers=kafka-bootstrap.middleware.svc:9092
kafka.input.topic.behavior=detections.behavior.v1
kafka.input.topic.business=detections.business.v1
kafka.output.topic=alerts.v1
kafka.group.id=flink-alert-generator-job

# Kafka Consumer 配置
kafka.consumer.auto.offset.reset=latest
kafka.consumer.max.poll.records=1000
kafka.consumer.fetch.min.bytes=1024
kafka.consumer.fetch.max.wait.ms=500

# Kafka Producer 配置
kafka.producer.acks=all
kafka.producer.enable.idempotence=true
kafka.producer.retries=3
kafka.producer.batch.size=65536
kafka.producer.linger.ms=10
kafka.producer.compression.type=lz4

# ==================== ClickHouse 配置 ====================
clickhouse.url=clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123
clickhouse.database=traffic
clickhouse.alert.table=alerts
clickhouse.evidence.table=evidence
clickhouse.user=default
clickhouse.password=

# ClickHouse 写入优化
clickhouse.batch.size=5000
clickhouse.batch.interval.ms=2000
clickhouse.max.retries=3

# ==================== OpenSearch 配置 ====================
opensearch.url=http://opensearch.middleware.svc:9200
opensearch.index=alerts
opensearch.user=admin
opensearch.password=${OPENSEARCH_ADMIN_PASSWORD}

# OpenSearch 写入优化
opensearch.bulk.flush.max.actions=1000
opensearch.bulk.flush.max.size.mb=5
opensearch.bulk.flush.interval.ms=5000

# ==================== Arkime 配置 ====================
arkime.url=http://arkime.middleware.svc:8005
arkime.window.before.sec=120
arkime.window.after.sec=120

# ==================== Checkpoint 配置 ====================
checkpoint.path=s3://flink-checkpoints/checkpoints/alert-generator-job
checkpoint.interval.ms=60000
checkpoint.timeout.ms=120000
checkpoint.min.pause.ms=30000

# ==================== 去重配置 ====================
dedup.window.minutes=10

# ==================== Severity 阈值配置 ====================
severity.threshold.critical=0.9
severity.threshold.high=0.7
severity.threshold.medium=0.5
severity.threshold.low=0.3

# ==================== Evidence 生成策略 ====================
# only_first: 仅首次告警生成证据
# always: 每次都生成
# sample: 采样生成（配合 evidence.sample.rate）
evidence.strategy=only_first
evidence.sample.rate=0.1

# ==================== 作业配置 ====================
parallelism=4
processing.guarantee=at-least-once

# ==================== 调试配置 ====================
debug.print=false
