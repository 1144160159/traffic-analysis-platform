# =============================================================================
# Flink CEP Job Configuration
# =============================================================================

# 集群配置
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.bind-host: 0.0.0.0
jobmanager.memory.process.size: 2048m

taskmanager.bind-host: 0.0.0.0
taskmanager.host: taskmanager
taskmanager.memory.process.size: 4096m
taskmanager.numberOfTaskSlots: 4

parallelism.default: 4

# Web UI
rest.address: 0.0.0.0
rest.port: 8081
rest.bind-address: 0.0.0.0
web.submit.enable: true
web.cancel.enable: true

# Checkpoint 配置 (CEP 作业需要更长的超时)
execution.checkpointing.interval: 60000
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 180000
execution.checkpointing.min-pause: 30000
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
execution.checkpointing.unaligned: false

# State Backend 配置
state.backend: rocksdb
state.backend.rocksdb.localdir: /tmp/rocksdb
state.backend.incremental: true
state.checkpoints.dir: file:///opt/flink/checkpoints
state.savepoints.dir: file:///opt/flink/savepoints

# RocksDB 调优
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.fixed-per-slot: 512mb
state.backend.rocksdb.checkpoint.transfer.thread.num: 4
state.backend.rocksdb.compaction.level.use-dynamic-size: true

# 网络配置
taskmanager.network.memory.fraction: 0.1
taskmanager.network.memory.min: 64mb
taskmanager.network.memory.max: 1gb

# 重启策略
restart-strategy: fixed-delay
restart-strategy.fixed-delay.attempts: 3
restart-strategy.fixed-delay.delay: 30s

# 高可用 (生产环境启用)
# high-availability: zookeeper
# high-availability.storageDir: hdfs:///flink/ha
# high-availability.zookeeper.quorum: zk-0:2181,zk-1:2181,zk-2:2181
# high-availability.zookeeper.path.root: /flink

# Metrics 配置
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9249
metrics.scope.jm: flink.jobmanager
metrics.scope.jm.job: flink.jobmanager.<job_name>
metrics.scope.tm: flink.taskmanager.<tm_id>
metrics.scope.tm.job: flink.taskmanager.<tm_id>.<job_name>
metrics.scope.task: flink.taskmanager.<tm_id>.<job_name>.<task_name>.<subtask_index>
metrics.scope.operator: flink.taskmanager.<tm_id>.<job_name>.<operator_name>.<subtask_index>

# 日志配置
env.log.dir: /var/log/flink
env.log.max: 10

# 安全配置 (生产环境启用)
# security.kerberos.login.use-ticket-cache: true
# security.kerberos.login.keytab: /etc/security/keytabs/flink.keytab
# security.kerberos.login.principal: flink@REALM

# 类加载
classloader.resolve-order: parent-first
classloader.check-leaked-classloader: false

# 历史服务器
# historyserver.web.address: 0.0.0.0
# historyserver.web.port: 8082
# historyserver.archive.fs.dir: hdfs:///flink/completed-jobs
# historyserver.archive.fs.refresh-interval: 10000
