# =============================================================================
# Grafana Dashboard 配置
# =============================================================================

apiVersion: 1

providers:
  - name: 'PCAP Index Job Dashboards'
    orgId: 1
    folder: 'Flink Jobs'
    folderUid: 'flink-jobs'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
