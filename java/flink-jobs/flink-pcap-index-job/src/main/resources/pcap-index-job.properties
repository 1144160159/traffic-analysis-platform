# =============================================================================
# Flink PCAP Index Job Configuration (v2)
# =============================================================================

# ==================== Kafka 配置 ====================
# Kafka Brokers 地址（逗号分隔）
kafka.brokers=kafka-bootstrap.middleware.svc:9092

# 输入 Topic（探针上报 PCAP 索引元数据）
kafka.input.topic=pcap.index.v1

# Consumer Group ID
kafka.group.id=flink-pcap-index-job

# DLQ Topic（Dead Letter Queue，用于存储无效数据）
kafka.dlq.topic=dlq.pcap-index-job

# ==================== ClickHouse 配置 ====================
# ClickHouse 地址（host:port）
clickhouse.url=clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123

# ClickHouse 数据库名称
clickhouse.database=traffic

# ClickHouse 表名称（本地表）
clickhouse.table=pcap_index

# ClickHouse 用户名
clickhouse.user=default

# ClickHouse 密码（生产环境建议使用环境变量或密钥管理服务）
clickhouse.password=

# ==================== Checkpoint 配置 ====================
# Checkpoint 存储路径（支持 HDFS/S3/MinIO）
# 示例：
#   MinIO 大盘: s3://flink-checkpoints/checkpoints/pcap-index-job
#   HDFS: hdfs://namenode:8020/flink-checkpoints/pcap-index-job
#   S3: s3://my-bucket/flink-checkpoints/pcap-index-job
checkpoint.path=s3://flink-checkpoints/checkpoints/pcap-index-job

# Checkpoint 间隔（毫秒）
# 建议：30-60 秒
checkpoint.interval.ms=30000

# ==================== Watermark 配置 ====================
# Watermark 延迟（秒）
# 允许多少秒的乱序数据（PCAP 索引通常延迟较小）
watermark.delay.seconds=5

# ==================== 作业配置 ====================
# 并行度（建议与 Kafka 分区数对齐）
# PCAP 索引通常数据量较小，2-4 个并行度足够
parallelism=2

# ==================== 验证配置 ====================
# 大文件阈值（GB）
# 超过该大小的 PCAP 文件将记录告警日志
validation.max.file.size.gb=10

# 最大时间范围（小时）
# 超过该时间范围的 PCAP 文件将记录告警日志（可能是异常数据）
validation.max.time.range.hours=1

# ==================== 调试配置 ====================
# 是否打印处理结果到标准输出（仅用于本地调试）
# 生产环境必须设置为 false
debug.print=false

# =============================================================================
# 生产环境配置示例（覆盖默认值）
# =============================================================================
# kafka.brokers=kafka-1:9092,kafka-2:9092,kafka-3:9092
# clickhouse.url=clickhouse-cluster:8123
# checkpoint.path=s3://my-bucket/flink-checkpoints/pcap-index-job
# parallelism=4
# debug.print=false
