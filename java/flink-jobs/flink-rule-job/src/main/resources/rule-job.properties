# ============================================================================
# Flink Rule Job Configuration
# ============================================================================

# ============================================================================
# Kafka Configuration
# ============================================================================
kafka.brokers=kafka-bootstrap.middleware.svc:9092

# Input Topics
kafka.feature.topic=feature.stat.v1
kafka.rule.topic=rule.updates

# Output Topics
kafka.output.topic=detections.v1
kafka.dlq.topic=dlq.rule-job

# Consumer Group
kafka.group.id=flink-rule-job

# Consumer Properties
kafka.consumer.fetch.min.bytes=1048576
kafka.consumer.fetch.max.wait.ms=500

# Producer Properties
kafka.producer.compression.type=lz4
kafka.producer.batch.size=65536
kafka.producer.linger.ms=10
kafka.producer.acks=all

# ============================================================================
# ClickHouse Configuration
# ============================================================================
clickhouse.url=clickhouse-1.middleware.svc:8123,clickhouse-2.middleware.svc:8123
clickhouse.database=traffic
clickhouse.table=detections_behavior
clickhouse.user=default
clickhouse.password=

# ClickHouse JDBC Properties
clickhouse.batch.size=5000
clickhouse.batch.interval.ms=2000
clickhouse.max.retries=3

# ============================================================================
# Flink Configuration
# ============================================================================

# Parallelism
parallelism=4

# Checkpoint Configuration
checkpoint.path=s3://flink-checkpoints/checkpoints/rule-job
checkpoint.interval.ms=60000
checkpoint.timeout.ms=120000
checkpoint.min.pause.ms=30000
checkpoint.max.concurrent=1

# State Backend
state.backend=rocksdb
state.backend.incremental=true

# ============================================================================
# Rule Engine Configuration
# ============================================================================

# Rule Processing
rule.max.priority=100
rule.min.priority=0

# IP Extraction
ip.extraction.log.failures=true
ip.extraction.fallback.redis=false

# ============================================================================
# Metrics & Monitoring
# ============================================================================

# Enable Metrics
metrics.enabled=true
metrics.interval.seconds=60

# Metrics Reporter
metrics.reporter.prometheus.class=org.apache.flink.metrics.prometheus.PrometheusReporter
metrics.reporter.prometheus.port=9250-9260

# ============================================================================
# Logging
# ============================================================================

# Log Level
log.level=INFO

# Audit Logging
audit.log.enabled=true
audit.log.rule.updates=true

# ============================================================================
# Debug & Testing
# ============================================================================

# Debug Mode (print detections to stdout)
debug.print=false

# Test Mode
test.mode=false
