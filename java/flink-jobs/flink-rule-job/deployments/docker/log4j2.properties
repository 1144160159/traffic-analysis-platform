# ============================================================================
# Flink Log4j2 Configuration
# ============================================================================

# Root Logger
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.rolling.ref = RollingFileAppender

# ==================== Appenders ====================

# Console Appender
appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Rolling File Appender
appender.rolling.name = RollingFileAppender
appender.rolling.type = RollingFile
appender.rolling.append = true
appender.rolling.fileName = ${sys:log.file}
appender.rolling.filePattern = ${sys:log.file}.%i
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n
appender.rolling.policies.type = Policies
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 100MB
appender.rolling.policies.startup.type = OnStartupTriggeringPolicy
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 10

# ==================== Logger Levels ====================

# Flink
logger.flink.name = org.apache.flink
logger.flink.level = INFO

# Flink Metrics
logger.metrics.name = org.apache.flink.metrics
logger.metrics.level = WARN

# Flink Runtime
logger.runtime.name = org.apache.flink.runtime
logger.runtime.level = INFO

# Flink State
logger.state.name = org.apache.flink.runtime.state
logger.state.level = INFO

# Flink Checkpoint
logger.checkpoint.name = org.apache.flink.runtime.checkpoint
logger.checkpoint.level = INFO

# Flink Kafka Connector
logger.kafka.name = org.apache.flink.connector.kafka
logger.kafka.level = INFO

# Kafka Client
logger.kafkaclient.name = org.apache.kafka
logger.kafkaclient.level = WARN

# ClickHouse
logger.clickhouse.name = com.clickhouse
logger.clickhouse.level = WARN

# Netty
logger.netty.name = org.apache.flink.shaded.netty4
logger.netty.level = WARN

# Akka
logger.akka.name = org.apache.flink.shaded.akka
logger.akka.level = WARN

# Zookeeper
logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = WARN

# RocksDB
logger.rocksdb.name = org.rocksdb
logger.rocksdb.level = WARN

# ==================== Application Loggers ====================

# Rule Job Main
logger.rulejob.name = com.traffic.flink.rule
logger.rulejob.level = INFO

# Rule Matcher
logger.matcher.name = com.traffic.flink.rule.matcher
logger.matcher.level = INFO

# Rule Broadcast
logger.broadcast.name = com.traffic.flink.rule.broadcast
logger.broadcast.level = INFO

# Sink
logger.sink.name = com.traffic.flink.rule.sink
logger.sink.level = INFO

# Common
logger.common.name = com.traffic.flink.common
logger.common.level = INFO

# ==================== Audit Logger (Separate) ====================
# 审计日志单独输出
logger.audit.name = RULE_AUDIT
logger.audit.level = INFO
logger.audit.additivity = false
logger.audit.appenderRef.console.ref = ConsoleAppender

# ==================== Suppress Noisy Loggers ====================

logger.hadoop.name = org.apache.hadoop
logger.hadoop.level = WARN

logger.hive.name = org.apache.hive
logger.hive.level = WARN

logger.parquet.name = org.apache.parquet
logger.parquet.level = WARN

logger.avro.name = org.apache.avro
logger.avro.level = WARN
