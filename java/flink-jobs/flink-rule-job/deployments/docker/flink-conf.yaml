# ============================================================================
# Flink Configuration for Rule Job
# 针对 Node-8 (2TB RAM) / Node-9 (512GB RAM) 优化
# ============================================================================

# ==================== 基础配置 ====================
jobmanager.rpc.address: jobmanager
jobmanager.rpc.port: 6123
jobmanager.bind-host: 0.0.0.0

taskmanager.bind-host: 0.0.0.0
taskmanager.host: taskmanager

# ==================== Web UI ====================
rest.address: 0.0.0.0
rest.bind-address: 0.0.0.0
rest.port: 8081

# ==================== 内存配置（生产环境调整） ====================
# JobManager 内存
jobmanager.memory.process.size: 4g
jobmanager.memory.heap.size: 2g
jobmanager.memory.off-heap.size: 1g
jobmanager.memory.jvm-overhead.min: 512m
jobmanager.memory.jvm-overhead.max: 1g

# TaskManager 内存（根据部署环境调整）
# 生产环境 Node-8: 100g, Node-9: 50g
taskmanager.memory.process.size: 8g
taskmanager.memory.framework.heap.size: 256m
taskmanager.memory.task.heap.size: 4g
taskmanager.memory.managed.size: 2g
taskmanager.memory.network.min: 512m
taskmanager.memory.network.max: 1g
taskmanager.memory.jvm-overhead.min: 256m
taskmanager.memory.jvm-overhead.max: 512m

# ==================== 并行度 ====================
taskmanager.numberOfTaskSlots: 4
parallelism.default: 4

# ==================== State Backend ====================
state.backend: rocksdb
state.backend.incremental: true
state.backend.rocksdb.localdir: /data/flink/rocksdb

# RocksDB 内存优化
state.backend.rocksdb.memory.managed: true
state.backend.rocksdb.memory.fixed-per-slot: 512m
state.backend.rocksdb.memory.write-buffer-ratio: 0.5
state.backend.rocksdb.memory.high-prio-pool-ratio: 0.1

# RocksDB 性能调优
state.backend.rocksdb.thread.num: 4
state.backend.rocksdb.writebuffer.count: 4
state.backend.rocksdb.writebuffer.size: 128m
state.backend.rocksdb.block.cache-size: 256m
state.backend.rocksdb.block.blocksize: 32kb

# ==================== Checkpoint ====================
execution.checkpointing.interval: 60000
execution.checkpointing.mode: EXACTLY_ONCE
execution.checkpointing.timeout: 180000
execution.checkpointing.min-pause: 30000
execution.checkpointing.max-concurrent-checkpoints: 1
execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
execution.checkpointing.unaligned: true

state.checkpoints.dir: file:///data/flink/checkpoints
state.savepoints.dir: file:///data/flink/savepoints

# Local Recovery（加速故障恢复）
state.backend.local-recovery: true
taskmanager.state.local.root-dirs: /data/flink/local-recovery

# ==================== 重启策略 ====================
restart-strategy: failure-rate
restart-strategy.failure-rate.max-failures-per-interval: 10
restart-strategy.failure-rate.failure-rate-interval: 5min
restart-strategy.failure-rate.delay: 30s

# ==================== 网络配置 ====================
taskmanager.network.memory.fraction: 0.1
taskmanager.network.memory.min: 256m
taskmanager.network.memory.max: 1g
taskmanager.network.request-backoff.initial: 100
taskmanager.network.request-backoff.max: 10000

# 网络缓冲区
taskmanager.network.memory.buffers-per-channel: 4
taskmanager.network.memory.floating-buffers-per-gate: 16

# ==================== Metrics ====================
metrics.reporters: prom
metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
metrics.reporter.prom.port: 9250

# 指标范围
metrics.scope.jm: <host>.jobmanager
metrics.scope.jm.job: <host>.jobmanager.<job_name>
metrics.scope.tm: <host>.taskmanager.<tm_id>
metrics.scope.tm.job: <host>.taskmanager.<tm_id>.<job_name>
metrics.scope.task: <host>.taskmanager.<tm_id>.<job_name>.<task_name>.<subtask_index>
metrics.scope.operator: <host>.taskmanager.<tm_id>.<job_name>.<operator_name>.<subtask_index>

# ==================== 高可用配置（生产环境启用） ====================
# high-availability: zookeeper
# high-availability.storageDir: hdfs:///flink/ha
# high-availability.zookeeper.quorum: zk1:2181,zk2:2181,zk3:2181
# high-availability.zookeeper.path.root: /flink

# ==================== 安全配置 ====================
security.kerberos.login.use-ticket-cache: false
security.ssl.internal.enabled: false
security.ssl.rest.enabled: false

# ==================== 日志配置 ====================
env.log.dir: /opt/flink/log
env.log.max: 10

# ==================== 类加载 ====================
classloader.resolve-order: parent-first
classloader.check-leaked-classloader: false

# ==================== Web UI ====================
web.submit.enable: true
web.cancel.enable: true
web.upload.dir: /opt/flink/upload
web.timeout: 600000

# ==================== Akka 配置 ====================
akka.ask.timeout: 60s
akka.watch.heartbeat.interval: 10s
akka.watch.heartbeat.pause: 60s

# ==================== Blob Server ====================
blob.server.port: 6124
blob.fetch.retries: 5
blob.fetch.num-concurrent: 50

# ==================== 历史服务器（可选） ====================
# jobmanager.archive.fs.dir: file:///data/flink/archive
# historyserver.archive.fs.dir: file:///data/flink/archive
# historyserver.web.address: 0.0.0.0
# historyserver.web.port: 8082
