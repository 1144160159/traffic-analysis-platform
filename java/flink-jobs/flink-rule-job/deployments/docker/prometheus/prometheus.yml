# ============================================================================
# Prometheus Configuration for Flink Rule Job
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'flink-rule-job'
    env: 'development'

# ==================== 告警规则 ====================
rule_files:
  - '/etc/prometheus/rules/*.yml'

# ==================== Alertmanager（可选） ====================
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# ==================== 抓取配置 ====================
scrape_configs:
  
  # ==================== Prometheus 自身 ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ==================== Flink JobManager ====================
  - job_name: 'flink-jobmanager'
    static_configs:
      - targets: ['flink-jobmanager:9250']
        labels:
          component: 'jobmanager'
    metrics_path: /
    honor_labels: true
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  # ==================== Flink TaskManager ====================
  - job_name: 'flink-taskmanager'
    static_configs:
      - targets: ['flink-taskmanager:9250']
        labels:
          component: 'taskmanager'
    metrics_path: /
    honor_labels: true
    # 动态发现 TaskManager（生产环境使用 Kubernetes SD）
    # kubernetes_sd_configs:
    #   - role: pod
    #     namespaces:
    #       names: ['traffic-analysis']
    # relabel_configs:
    #   - source_labels: [__meta_kubernetes_pod_label_component]
    #     action: keep
    #     regex: taskmanager

  # ==================== Kafka ====================
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
        labels:
          component: 'kafka'
    # Kafka JMX Exporter（需额外配置）
    # metrics_path: /metrics
    # scheme: http

  # ==================== ClickHouse ====================
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
        labels:
          component: 'clickhouse'
    metrics_path: /metrics
    scheme: http
    # ClickHouse 内置 Prometheus 端点（需开启）
    # 或使用 clickhouse-exporter

  # ==================== Redis ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          component: 'redis'
    # 需要 redis-exporter
    # metrics_path: /metrics

