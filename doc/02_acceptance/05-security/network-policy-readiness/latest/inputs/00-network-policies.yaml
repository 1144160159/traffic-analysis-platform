    - {protocol: TCP, port: 8086}
    - {protocol: TCP, port: 8087}
    - {protocol: TCP, port: 50051}
    - {protocol: TCP, port: 50053}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: iam
    ports:
    - {protocol: TCP, port: 8443}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    ports:
    - {protocol: TCP, port: 3000}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: nacos
    ports:
    - {protocol: TCP, port: 8848}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flink
    ports:
    - {protocol: TCP, port: 8081}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: middleware
    ports:
    - {protocol: TCP, port: 8080}
    - {protocol: TCP, port: 7002}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: streampark
    ports:
    - {protocol: TCP, port: 8080}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argo
    ports:
    - {protocol: TCP, port: 2746}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: minio
    ports:
    - {protocol: TCP, port: 9002}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: registry
    ports:
    - {protocol: TCP, port: 8080}
