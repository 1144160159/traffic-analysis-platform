name: MLOps CD - Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'mlops/**'
      - 'go/control-plane/internal/rules/model/**'
      - 'go/control-plane/internal/rules/repository/model_repository.go'
      - 'go/control-plane/internal/rules/service/model_service.go'
      - 'go/control-plane/internal/rules/service/mlops_orchestrator.go'
      - 'go/control-plane/internal/rules/api/handler_models.go'
      - 'go/control-plane/internal/rules/api/handler_orchestrator.go'
      - 'go/control-plane/internal/rules/publisher/kafka_publisher.go'
  workflow_dispatch:
    inputs:
      deploy_go:
        description: 'Deploy Go rule-manager service'
        type: boolean
        default: true
      deploy_argo:
        description: 'Deploy Argo WorkflowTemplate'
        type: boolean
        default: true
      deploy_configmap:
        description: 'Update MLOps scripts ConfigMap'
        type: boolean
        default: true
      deploy_flink:
        description: 'Deploy Flink behavior job JAR'
        type: boolean
        default: false

env:
  REGISTRY: registry.example.com
  IMAGE_NAME: traffic/rule-manager
  K8S_NAMESPACE: traffic-analysis

jobs:
  # ==========================================================================
  # Stage 1: Build Docker images
  # ==========================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      go-image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta — Go rule-manager
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push — Go rule-manager
        uses: docker/build-push-action@v5
        with:
          context: .
          file: go/control-plane/deployments/docker/Dockerfile.rule-manager
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

      - name: Build & push — MLOps Python image
        uses: docker/build-push-action@v5
        with:
          context: mlops
          file: mlops/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/traffic/mlops-trainer:${{ github.sha }},${{ env.REGISTRY }}/traffic/mlops-trainer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Stage 2: Deploy Argo WorkflowTemplate
  # ==========================================================================
  deploy-argo:
    name: Deploy Argo Workflows
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy_argo != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy WorkflowTemplate
        run: |
          kubectl apply -f mlops/workflows/mlops-workflow-template.yaml
          kubectl apply -f mlops/workflows/cron-training-workflow.yaml

      - name: Update MLOps ConfigMap
        if: ${{ github.event.inputs.deploy_configmap != 'false' }}
        run: |
          # Build updated configmap from scripts
          kubectl create configmap mlops-scripts \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-file=mlops/scripts/extract_data.py \
            --from-file=mlops/scripts/train_model.py \
            --from-file=mlops/scripts/evaluate_model.py \
            --from-file=mlops/scripts/register_model.py \
            --from-file=mlops/requirements.txt \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify deployment
        run: |
          echo "WorkflowTemplates:"
          kubectl get workflowtemplate -n ${{ env.K8S_NAMESPACE }} | grep mlops || echo "  (not found)"
          echo ""
          echo "ConfigMaps:"
          kubectl get configmap mlops-scripts -n ${{ env.K8S_NAMESPACE }} -o wide 2>/dev/null || echo "  (not found)"

  # ==========================================================================
  # Stage 3: Deploy Go rule-manager
  # ==========================================================================
  deploy-go:
    name: Deploy Go Service
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.deploy_go != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Update rule-manager deployment image
        run: |
          kubectl set image deployment/rule-manager \
            --namespace=${{ env.K8S_NAMESPACE }} \
            rule-manager=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/rule-manager \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Verify health
        run: |
          sleep 10
          kubectl exec -n ${{ env.K8S_NAMESPACE }} deploy/rule-manager -- \
            wget -qO- http://localhost:8080/health 2>/dev/null || \
            echo "Health check skipped (no wget in container)"

      - name: Verify MLOps API
        run: |
          # Port-forward and test the orchestrator status endpoint
          kubectl port-forward -n ${{ env.K8S_NAMESPACE }} svc/rule-manager 8080:8080 &
          sleep 3
          curl -s http://localhost:8080/api/v1/mlops/status | python3 -m json.tool 2>/dev/null || \
            echo "MLOps API check skipped"
          kill %1 2>/dev/null || true

  # ==========================================================================
  # Stage 4: Argo Workflow smoke test (optional)
  # ==========================================================================
  smoke-test:
    name: Smoke Test — Submit Argo Workflow
    runs-on: ubuntu-latest
    needs: deploy-argo
    if: false  # Disabled by default — enable when cluster is accessible from CI
    steps:
      - uses: actions/checkout@v4

      - name: Install Argo CLI
        run: |
          curl -sLO https://github.com/argoproj/argo-workflows/releases/download/v3.5.0/argo-linux-amd64.gz
          gunzip argo-linux-amd64.gz
          chmod +x argo-linux-amd64
          sudo mv argo-linux-amd64 /usr/local/bin/argo

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Submit dry-run workflow
        run: |
          argo submit -n ${{ env.K8S_NAMESPACE }} \
            --from workflowtemplate/mlops-training-template \
            --dry-run \
            -p model-type=xgboost \
            -p lookback-days=1 \
            -p min-f1-score=0.5 \
            -p auto-activate=false

  # ==========================================================================
  # Stage 5: CD Gate
  # ==========================================================================
  cd-gate:
    name: CD Gate — Deployment complete
    needs: [build, deploy-argo, deploy-go]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "========================================="
          echo " MLOps CD Pipeline Summary"
          echo "========================================="
          echo " Build:        ${{ needs.build.result }}"
          echo " Deploy Argo:  ${{ needs.deploy-argo.result }}"
          echo " Deploy Go:    ${{ needs.deploy-go.result }}"
          echo "========================================="
