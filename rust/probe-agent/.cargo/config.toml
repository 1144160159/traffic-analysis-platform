# rust/probe-agent/.cargo/config.toml

[build]
# 默认目标
# target = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-unknown-linux-gnu]
# Kunpeng 920 优化
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+neon,+aes,+sha2,+crc"
]

#[target.bpfel-unknown-none]
#rustflags = ["-C", "link-arg=-z", "-C", "link-arg=noexecstack"]

[env]
# eBPF 编译器
CLANG = "clang"

[alias]
# 便捷命令
xtask = "run --package xtask --"
build-ebpf = "build --package probe-agent-ebpf --target bpfel-unknown-none -Z build-std=core"
build-agent = "build --package probe-agent --release"
build-all = "xtask build-all"
# helper alias: build using Docker image added at docker/Dockerfile.build
# Note: this alias is informational only; run the shell script at docker/build.sh
build-docker = "run --package xtask -- docker-build"
