# NTA Probe Agent Configuration

tenant_id: "campus-network"
probe_id: "probe-001"

capture:
  interface: "eth0"
  mode: "af_packet"  # "xdp" or "af_packet"
  queue_id: 0
  buffer_size: 8192
  ring_size: 4096

aggregator:
  flow_table_capacity: 1000000
  idle_timeout_sec: 120
  active_timeout_sec: 1800
  scan_interval_sec: 1

archiver:
  enabled: true
  buffer_size_mb: 256
  rotation_interval_sec: 60
  s3_endpoint: "http://10.0.5.8:9000"
  s3_region: "us-east-1"
  s3_bucket: "pcap"
  s3_access_key: "minioadmin"
  s3_secret_key: "minioadmin"
  zstd_level: 3
  max_concurrent_uploads: 4

sender:
  gateway_addr: "http://10.0.5.8:50051"
  batch_size: 100
  batch_timeout_ms: 100
  max_retries: 3
  local_cache_path: "/var/lib/probe-agent/cache"
  # TLS configuration (optional)
  # tls_ca_cert: "/etc/probe-agent/certs/ca.crt"
  # tls_client_cert: "/etc/probe-agent/certs/client.crt"
  # tls_client_key: "/etc/probe-agent/certs/client.key"

metrics:
  enabled: true
  listen_addr: "0.0.0.0:9090"