// =============================================================================
// FILE: proto/traffic/v1/session.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/common.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// SessionEvent 双向会话事件
message SessionEvent {
  EventHeader header = 1;
  string session_id = 2;
  string community_id = 3;
  FiveTuple tuple = 4;
  int64 ts_start = 5;
  int64 ts_end = 6;
  uint32 duration_ms = 7;
  uint32 protocol = 8;
  string client_ip = 9;
  string server_ip = 10;
  uint32 client_port = 11;
  uint32 server_port = 12;
  uint64 packets_total = 13;
  uint64 bytes_total = 14;
  uint64 bytes_fwd = 15;
  uint64 bytes_bwd = 16;
  float up_down_ratio = 17;
  uint32 num_pkts = 18;
  float avg_payload = 19;
  uint32 min_payload = 20;
  uint32 max_payload = 21;
  float std_payload = 22;
  float mean_iat_ms = 23;
  float min_iat_ms = 24;
  float max_iat_ms = 25;
  float std_iat_ms = 26;
  uint32 flags_syn = 27;
  uint32 flags_ack = 28;
  uint32 flags_fin = 29;
  uint32 flags_psh = 30;
  uint32 flags_rst = 31;
  uint32 dns_pkt_cnt = 32;
  uint32 tcp_pkt_cnt = 33;
  uint32 udp_pkt_cnt = 34;
  uint32 icmp_pkt_cnt = 35;
  bool has_syn = 36;
  bool has_fin = 37;
  bool has_rst = 38;
  bool is_established = 39;
  uint32 evidence_count = 40;
  repeated string flow_ids = 41;
  string end_reason = 42;
}

// SessionBatch 会话事件批次
message SessionBatch {
  repeated SessionEvent sessions = 1;
  string batch_id = 2;
  string tenant_id = 3;
  string probe_id = 4;
  string run_id = 5;
  uint32 batch_size = 6;
  string compression = 7;
  int64 created_at = 8;
}