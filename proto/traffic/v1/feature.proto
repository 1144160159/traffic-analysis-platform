// =============================================================================
// FILE: proto/traffic/v1/feature.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/common.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// FeatureStat L1 统计特征
message FeatureStat {
  EventHeader header = 1;
  string schema_version = 2;
  string object_type = 3;
  string object_id = 4;
  string community_id = 5;
  int64 ts = 6;
  uint32 protocol = 7;
  uint32 duration_ms = 8;
  float pps = 9;
  float bps = 10;
  float up_down_ratio = 11;
  float pktlen_mean = 12;
  float pktlen_std = 13;
  float iat_mean_ms = 14;
  float iat_std_ms = 15;
  float active_mean_ms = 16;
  float idle_mean_ms = 17;
  uint32 tcp_flag_syn_cnt = 18;
  uint32 tcp_flag_ack_cnt = 19;
  uint32 tcp_init_win_bytes_fwd = 20;
  uint32 tcp_init_win_bytes_bwd = 21;
  repeated float extra = 22;
}

// FeatureSeq L2 序列特征
message FeatureSeq {
  EventHeader header = 1;
  string object_type = 2;
  string object_id = 3;
  string community_id = 4;
  string window_id = 5;
  int64 ts_start = 6;
  int64 ts_end = 7;
  string pktlen_seq_hash = 8;
  string iat_seq_hash = 9;
  float wavelet_releng_fwd = 10;
  float wavelet_releng_bwd = 11;
  float wavelet_entropy_fwd = 12;
  float wavelet_entropy_bwd = 13;
  float wavelet_detail_mean_fwd = 14;
  float wavelet_detail_mean_bwd = 15;
  float wavelet_detail_std_fwd = 16;
  float wavelet_detail_std_bwd = 17;
  string seq_blob_ref = 18;
}

// FeatureFingerprint L3 指纹特征
message FeatureFingerprint {
  EventHeader header = 1;
  string community_id = 2;
  string session_id = 3;
  int64 ts = 4;
  uint32 is_encrypted = 5;
  string tls_version = 6;
  string ja3 = 7;
  string sni_hash = 8;
  string cert_sha256 = 9;
  uint32 cert_is_self_signed = 10;
  uint32 pubkey_len = 11;
  repeated float hex_freq = 12;
  repeated float hex_ratio = 13;
  float entropy_payload = 14;
  float chi_square_bfd = 15;
}

// FeatureBatch 特征批次
message FeatureBatch {
  repeated FeatureStat stats = 1;
  repeated FeatureSeq sequences = 2;
  repeated FeatureFingerprint fingerprints = 3;
  string batch_id = 4;
  string tenant_id = 5;
  string run_id = 6;
  int64 created_at = 7;
}