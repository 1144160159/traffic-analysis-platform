// =============================================================================
// FILE: proto/traffic/v1/pcap.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// PcapIndexMeta PCAP 索引元数据
message PcapIndexMeta {
  string tenant_id = 1;
  string probe_id = 2;
  string file_key = 3;
  int64 ts_start = 4;
  int64 ts_end = 5;
  uint64 byte_size = 6;
  uint32 zstd_level = 7;
  string sha256 = 8;
  string community_id = 9;
  string flow_id = 10;
  uint64 offset_start = 11;
  uint64 offset_end = 12;
  string bloom_filter_b64 = 13;
  repeated string community_ids = 14;
  int64 created_ts = 15;
}

// PcapIndexBatch PCAP 索引批次
message PcapIndexBatch {
  repeated PcapIndexMeta indexes = 1;
  string batch_id = 2;
  string tenant_id = 3;
  string probe_id = 4;
  int64 created_at = 5;
}

// PcapCutRequest PCAP 裁剪请求
message PcapCutRequest {
  string tenant_id = 1;
  string src_ip = 2;
  string dst_ip = 3;
  uint32 src_port = 4;
  uint32 dst_port = 5;
  uint32 protocol = 6;
  int64 start_time = 7;
  int64 end_time = 8;
  string community_id = 9;
  string flow_id = 10;
  uint32 max_packets = 11;
  uint64 max_bytes = 12;
  string output_format = 13;
  bool compress = 14;
}

// PcapCutResponse PCAP 裁剪响应
message PcapCutResponse {
  string job_id = 1;
  string status = 2;
  string download_url = 3;
  int32 progress_percent = 4;
  string error_message = 5;
  uint64 total_packets = 6;
  uint64 total_bytes = 7;
  int32 files_scanned = 8;
  int32 files_matched = 9;
  int64 created_at = 10;
  int64 started_at = 11;
  int64 completed_at = 12;
  int64 expires_at = 13;
}

// PcapCutJobStatus 裁剪任务状态查询
message PcapCutJobStatus {
  string job_id = 1;
  string tenant_id = 2;
}