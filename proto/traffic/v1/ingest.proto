// =============================================================================
// FILE: proto/traffic/v1/ingest.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/flow.proto";
import "traffic/v1/session.proto";
import "traffic/v1/pcap.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// ==================== IngestService 定义 ====================

service IngestService {
  // 批量上报 Flow 事件
  rpc UploadFlows(UploadFlowsRequest) returns (UploadFlowsResponse);

  // 流式上报 Flow 事件（双向流）
  rpc StreamFlows(stream StreamFlowsRequest) returns (stream StreamFlowsResponse);

  // 批量上报 Session 事件
  rpc UploadSessions(UploadSessionsRequest) returns (UploadSessionsResponse);

  // 上报 PCAP 索引元数据
  rpc UploadPcapIndex(UploadPcapIndexRequest) returns (UploadPcapIndexResponse);

  // 探针心跳与配置同步
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // 探针注册
  rpc RegisterProbe(RegisterProbeRequest) returns (RegisterProbeResponse);
}

// ==================== Flow 上报 ====================

message UploadFlowsRequest {
  repeated FlowEvent events = 1;
  string compression = 2;
}

message UploadFlowsResponse {
  int32 accepted = 1;
  int32 rejected = 2;
  repeated string rejected_ids = 3;
  string message = 4;
}

// ==================== Flow 流式上报 ====================

message StreamFlowsRequest {
  FlowEvent event = 1;
}

message StreamFlowsResponse {
  string event_id = 1;
  bool accepted = 2;
  string error = 3;
}

// ==================== Session 上报 ====================

message UploadSessionsRequest {
  repeated SessionEvent sessions = 1;
  string compression = 2;
}

message UploadSessionsResponse {
  int32 accepted = 1;
  int32 rejected = 2;
  repeated string rejected_ids = 3;
  string message = 4;
}

// ==================== PCAP Index 上报 ====================

message UploadPcapIndexRequest {
  PcapIndexMeta index = 1;
}

message UploadPcapIndexResponse {
  bool success = 1;
  string message = 2;
}

// ==================== 心跳 ====================

message HeartbeatRequest {
  string tenant_id = 1;
  string probe_id = 2;
  ProbeStatus status = 3;
}

message HeartbeatResponse {
  bool ok = 1;
  ProbeConfig config = 2;
}

// ==================== 探针注册 ====================

message RegisterProbeRequest {
  string tenant_id = 1;
  string probe_id = 2;
  HardwareInfo hardware = 3;
  string software_version = 4;
  string build_commit = 5;
  int64 build_timestamp = 6;
}

message RegisterProbeResponse {
  bool success = 1;
  string message = 2;
  ProbeConfig initial_config = 3;
}

// ==================== 探针状态与配置 ====================

message ProbeStatus {
  float cpu_usage = 1;
  float memory_usage = 2;
  uint64 capture_pps = 3;
  uint64 upload_bps = 4;
  uint64 packets_captured = 5;
  uint64 packets_dropped = 6;
  int64 uptime_seconds = 7;
  repeated InterfaceStatus interfaces = 10;
}

message InterfaceStatus {
  string name = 1;
  bool link_up = 2;
  uint64 speed_mbps = 3;
  uint64 rx_packets = 4;
  uint64 tx_packets = 5;
  uint64 rx_bytes = 6;
  uint64 tx_bytes = 7;
  uint64 rx_errors = 8;
  uint64 tx_errors = 9;
  uint64 rx_crc_errors = 10;
  uint64 rx_dropped = 11;
  uint64 collisions = 12;
  //uint64 tx_dropped = 13;
}

message ProbeConfig {
  string config_version = 1;
  float sample_rate = 2;
  string bpf_filter = 3;
  uint32 idle_timeout_sec = 4;
  uint32 active_timeout_sec = 5;
  uint32 batch_size = 6;
  string feature_set_version = 7;
  NetworkInterfaceConfig nic_config = 10;
  uint32 ring_buffer_size = 11;
  uint32 batch_drain_timeout_ms = 12;
}

message NetworkInterfaceConfig {
  string interface_name = 1;
  bool promiscuous_mode = 2;
  repeated string bpf_filters = 3;
  uint32 ring_buffer_size_mb = 4;
  string driver_mode = 5;
  CPUAffinityConfig cpu_affinity = 6;
}

message CPUAffinityConfig {
  repeated uint32 cpu_cores = 1;
  bool numa_aware = 2;
}

message HardwareInfo {
  string cpu_model = 1;
  uint32 cpu_cores = 2;
  uint64 memory_mb = 3;
  string os_version = 4;
  repeated NIC nics = 5;
}

message NIC {
  string name = 1;
  string mac_address = 2;
  string pci_address = 3;
  string driver = 4;
  uint64 speed_mbps = 5;
  string driver_version = 6;
}