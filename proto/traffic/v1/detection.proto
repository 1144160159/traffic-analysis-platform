// =============================================================================
// FILE: proto/traffic/v1/detection.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/common.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// DetectionBehavior 行为检测结果
message DetectionBehavior {
  EventHeader header = 1;
  string model_version = 2;
  string community_id = 3;
  string object_type = 4;
  string object_id = 5;
  int64 ts = 6;
  repeated string labels = 7;
  repeated float scores = 8;
  string top_label = 9;
  float top_score = 10;
}

// DetectionBusiness 业务检测结果
message DetectionBusiness {
  EventHeader header = 1;
  string model_version = 2;
  string rule_version = 3;
  int64 ts = 4;
  string community_id = 5;
  string session_id = 6;
  string campaign_id = 7;
  string detection_type = 8;
  string label = 9;
  float score = 10;
}

// DetectionBatch 检测结果批次
message DetectionBatch {
  repeated DetectionBehavior behaviors = 1;
  repeated DetectionBusiness businesses = 2;
  string batch_id = 3;
  string tenant_id = 4;
  string run_id = 5;
  int64 created_at = 6;
}