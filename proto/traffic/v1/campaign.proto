// =============================================================================
// FILE: proto/traffic/v1/campaign.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/alert.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// CampaignBatch 战役批次
message CampaignBatch {
  repeated Campaign campaigns = 1;
  string batch_id = 2;
  string tenant_id = 3;
  int64 created_at = 4;
}

// CampaignQuery 战役查询请求
message CampaignQuery {
  string tenant_id = 1;
  string campaign_id = 2;
  int64 start_time = 3;
  int64 end_time = 4;
  repeated string campaign_types = 5;
}

// CampaignQueryResponse 战役查询响应
message CampaignQueryResponse {
  repeated Campaign campaigns = 1;
  int32 total_count = 2;
  bool has_more = 3;
}