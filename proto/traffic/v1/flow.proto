// =============================================================================
// FILE: proto/traffic/v1/flow.proto
// =============================================================================

syntax = "proto3";

package traffic.v1;

import "traffic/v1/common.proto";

option go_package = "github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto/traffic/v1;trafficv1";
option java_package = "com.traffic.proto.traffic.v1";
option java_multiple_files = true;

// FlowEvent 流事件（对应 ClickHouse flows_raw 表）
message FlowEvent {
  EventHeader header = 1;
  string flow_id = 2;
  string community_id = 3;
  FiveTuple tuple = 4;
  string direction = 5;
  int64 ts_start = 6;
  int64 ts_end = 7;
  uint32 duration_ms = 8;
  uint32 packets_fwd = 9;
  uint32 packets_bwd = 10;
  uint64 bytes_fwd = 11;
  uint64 bytes_bwd = 12;
  float pps = 13;
  float bps = 14;
  PacketLengthStats pktlen_stats = 15;
  InterArrivalStats iat_stats = 16;
  uint32 tcp_flags_fwd = 17;
  uint32 tcp_flags_bwd = 18;
  uint32 tos = 19;
  ActiveIdleStats active_stats = 20;
  ActiveIdleStats idle_stats = 21;
  uint32 subflow_count = 22;
}

// FlowBatch 流事件批次
message FlowBatch {
  repeated FlowEvent flows = 1;
  BatchMetadata metadata = 2;
}

// BatchMetadata 批次元数据
message BatchMetadata {
  string batch_id = 1;
  string tenant_id = 2;
  string probe_id = 3;
  string run_id = 4;
  uint32 batch_size = 5;
  string compression = 6;
  int64 created_at = 7;
}