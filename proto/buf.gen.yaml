# proto/buf.gen.yaml
version: v1

managed:
  enabled: true
  go_package_prefix:
    default: github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto
  java_package_prefix:
    default: com.traffic.proto
  java_multiple_files: true

plugins:
  # ==================== Rust (prost + tonic) ====================
  - plugin: buf.build/community/neoeinstein-prost:v0.3.1
    out: ../rust/probe-agent/proto-gen/src
    opt:
      - compile_well_known_types
      - extern_path=.google.protobuf=::pbjson_types

  - plugin: buf.build/community/neoeinstein-prost-serde:v0.3.1
    out: ../rust/probe-agent/proto-gen/src

  - plugin: buf.build/community/neoeinstein-tonic:v0.4.1
    out: ../rust/probe-agent/proto-gen/src
    opt:
      - compile_well_known_types
      - extern_path=.google.protobuf=::pbjson_types

  # ==================== Go (protoc-gen-go + grpc) ====================
  - plugin: buf.build/protocolbuffers/go:v1.32.0
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative

  - plugin: buf.build/grpc/go:v1.3.0
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # ==================== Java (protobuf + grpc) ====================
  - plugin: buf.build/protocolbuffers/java:v25.2
    out: ../java/flink-jobs/flink-common/src/main/java

  - plugin: buf.build/grpc/java:v1.61.0
    out: ../java/flink-jobs/flink-common/src/main/java