# proto/buf.gen.yaml
version: v1

managed:
  enabled: true
  go_package_prefix:
    default: github.com/1144160159/traffic-analysis-platform/go/control-plane/pkg/proto
    except:
      - buf.build/googleapis/googleapis
  java_package_prefix:
    default: com.traffic.proto
  optimize_for: SPEED

plugins:
  # ==================== Go ====================
  - plugin: buf.build/protocolbuffers/go
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative

  - plugin: buf.build/grpc/go
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # ==================== Java ====================
  - plugin: buf.build/protocolbuffers/java
    out: ../java/flink-jobs/flink-common/src/main/java

  - plugin: buf.build/grpc/java
    out: ../java/flink-jobs/flink-common/src/main/java

  # ==================== Rust (prost + tonic) ====================
  # Note: Rust 使用 prost-build 在 build.rs 中生成，此处仅作备用
  # 主要通过 rust/probe-agent/proto-gen/build.rs 生成