version: v1

# =========================
# 使用更稳定的 Buf Schema Registry 插件版本
# =========================

plugins:
  # Rust: 使用 prost 插件
  - plugin: buf.build/community/neoeinstein-prost:v0.3.1
    out: ../rust/probe-agent/proto-gen/src
    opt:
      - bytes=.

  # Rust: 使用 tonic 插件（不带高级选项）
  - plugin: buf.build/community/neoeinstein-tonic:v0.3.0
    out: ../rust/probe-agent/proto-gen/src

  # Go: protobuf 消息生成
  - plugin: buf.build/protocolbuffers/go:v1.31.0
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative

  # Go: gRPC 服务代码生成
  - plugin: buf.build/grpc/go:v1.3.0
    out: ../go/control-plane/pkg/proto
    opt:
      - paths=source_relative

  # Java: protobuf 消息生成
  - plugin: buf.build/protocolbuffers/java:v33.2
    out: ../java/flink-jobs/flink-common/src/main/java

  # Java: gRPC 服务代码生成
  - plugin: buf.build/grpc/java:v1.58.0
    out: ../java/flink-jobs/flink-common/src/main/java
