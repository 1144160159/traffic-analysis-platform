apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-workflow
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow
  namespace: argo
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - argoproj.io
  resources:
  - workflowtaskresults
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow
  namespace: argo
subjects:
- kind: ServiceAccount
  name: argo-workflow
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-workflow
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: mlops-training-template
  namespace: argo
  labels:
    app: mlops-training
    component: self-orchestration
spec:
  entrypoint: orchestrator-pipeline
  serviceAccountName: argo-workflow
  arguments:
    parameters:
    - name: model-type
      value: xgboost
    - name: model-id
      value: behavior-classifier
    - name: feature-set-id
      value: v1
    - name: tenant-id
      value: default
    - name: lookback-days
      value: "7"
    - name: test-size
      value: "0.2"
    - name: min-feedback-count
      value: "100"
    - name: min-feature-count
      value: "1000"
    - name: min-f1-score
      value: "0.85"
    - name: auto-activate
      value: "false"
    - name: trigger
      value: manual
    - name: trigger-reason
      value: ""
    - name: trainer-image
      value: docker.io/traffic/mlops-trainer@sha256:4f40de900eed37b8fa169660edda9e53626cd596b53a0aeaf677b08e1e6b4011
  templates:
  - name: orchestrator-pipeline
    steps:
    - - name: preflight-check
        template: preflight-check
    - - name: run-training-pipeline
        template: training-pipeline
        when: "{{steps.preflight-check.outputs.parameters.training-ready}} == true"

  # Keep every artifact-producing/consuming step inside one conditional
  # boundary. When preflight says there is not enough data, Argo skips this
  # template as a unit instead of trying to resolve artifacts from a skipped
  # extract-data step.
  - name: training-pipeline
    steps:
    - - name: extract-data
        template: extract-data
    - - name: train-model
        template: train-model
        arguments:
          artifacts:
          - name: train-data
            from: "{{steps.extract-data.outputs.artifacts.train-data}}"
          - name: metadata
            from: "{{steps.extract-data.outputs.artifacts.metadata}}"
    - - name: evaluate-model
        template: evaluate-model
        arguments:
          artifacts:
          - name: model-file
            from: "{{steps.train-model.outputs.artifacts.model-file}}"
          - name: test-data
            from: "{{steps.extract-data.outputs.artifacts.test-data}}"
          - name: metadata
            from: "{{steps.extract-data.outputs.artifacts.metadata}}"
    - - name: register-model
        template: register-model
        when: "{{steps.evaluate-model.outputs.parameters.f1-score}} >= {{workflow.parameters.min-f1-score}}"
        arguments:
          artifacts:
          - name: model-file
            from: "{{steps.train-model.outputs.artifacts.model-file}}"
          - name: feature-columns
            from: "{{steps.train-model.outputs.artifacts.feature-columns}}"
          - name: feature-importance
            from: "{{steps.train-model.outputs.artifacts.feature-importance}}"
          - name: train-metrics
            from: "{{steps.train-model.outputs.artifacts.train-metrics}}"
          - name: eval-metrics
            from: "{{steps.evaluate-model.outputs.artifacts.metrics}}"

  - name: preflight-check
    container:
      image: clickhouse/clickhouse-server:24.3
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
      - |
        set -eu
        mkdir -p /tmp/mlops
        tenant_escaped=$(printf "%s" "$TENANT_ID" | sed "s/'/''/g")
        days="$LOOKBACK_DAYS"
        query_error=false
        feedback_count=$(clickhouse-client \
          --host "$CLICKHOUSE_HOST" \
          --port "$CLICKHOUSE_PORT" \
          --user "$CLICKHOUSE_USER" \
          --password "$CLICKHOUSE_PASSWORD" \
          --query "SELECT count() FROM traffic.alert_feedback WHERE tenant_id = '${tenant_escaped}' AND label IN ('TP','FP') AND created_at >= now() - INTERVAL ${days} DAY") || query_error=true
        feature_count=$(clickhouse-client \
          --host "$CLICKHOUSE_HOST" \
          --port "$CLICKHOUSE_PORT" \
          --user "$CLICKHOUSE_USER" \
          --password "$CLICKHOUSE_PASSWORD" \
          --query "SELECT count() FROM traffic.feature_stat WHERE tenant_id = '${tenant_escaped}' AND ts >= now() - INTERVAL ${days} DAY") || query_error=true

        if [ "$query_error" = "true" ]; then
          feedback_count=${feedback_count:-0}
          feature_count=${feature_count:-0}
        fi

        ready=false
        reason="insufficient_data"
        if [ "$query_error" = "true" ]; then
          reason="query_error"
        elif [ "$feedback_count" -ge "$MIN_FEEDBACK_COUNT" ] && [ "$feature_count" -ge "$MIN_FEATURE_COUNT" ]; then
          ready=true
          reason="ready"
        fi

        printf "%s" "$ready" > /tmp/mlops/training_ready.txt
        printf "%s" "$feedback_count" > /tmp/mlops/feedback_count.txt
        printf "%s" "$feature_count" > /tmp/mlops/feature_count.txt
        cat > /tmp/mlops/preflight.json <<EOF
        {"tenant_id":"${TENANT_ID}","model_id":"${MODEL_ID}","feature_set_id":"${FEATURE_SET_ID}","lookback_days":${LOOKBACK_DAYS},"feedback_count":${feedback_count},"feature_count":${feature_count},"training_ready":${ready},"reason":"${reason}","trigger":"${TRIGGER}","trigger_reason":"${TRIGGER_REASON}"}
        EOF
        cat /tmp/mlops/preflight.json
      env:
      - name: CLICKHOUSE_HOST
        value: clickhouse-1.middleware.svc
      - name: CLICKHOUSE_PORT
        value: "9000"
      - name: CLICKHOUSE_USER
        value: default
      - name: CLICKHOUSE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: traffic-credentials
            key: CLICKHOUSE_PASSWORD
      - name: TENANT_ID
        value: "{{workflow.parameters.tenant-id}}"
      - name: MODEL_ID
        value: "{{workflow.parameters.model-id}}"
      - name: FEATURE_SET_ID
        value: "{{workflow.parameters.feature-set-id}}"
      - name: LOOKBACK_DAYS
        value: "{{workflow.parameters.lookback-days}}"
      - name: MIN_FEEDBACK_COUNT
        value: "{{workflow.parameters.min-feedback-count}}"
      - name: MIN_FEATURE_COUNT
        value: "{{workflow.parameters.min-feature-count}}"
      - name: TRIGGER
        value: "{{workflow.parameters.trigger}}"
      - name: TRIGGER_REASON
        value: "{{workflow.parameters.trigger-reason}}"
    outputs:
      parameters:
      - name: training-ready
        valueFrom:
          path: /tmp/mlops/training_ready.txt
      - name: feedback-count
        valueFrom:
          path: /tmp/mlops/feedback_count.txt
      - name: feature-count
        valueFrom:
          path: /tmp/mlops/feature_count.txt
      artifacts:
      - name: preflight-report
        path: /tmp/mlops/preflight.json
        s3:
          key: mlops/{{workflow.name}}/preflight.json

  - name: extract-data
    container:
      image: "{{workflow.parameters.trainer-image}}"
      imagePullPolicy: IfNotPresent
      command: ["python", "/app/scripts/extract_data.py"]
      env:
      - name: CLICKHOUSE_HOST
        value: clickhouse-1.middleware.svc
      - name: CLICKHOUSE_PORT
        value: "9000"
      - name: CLICKHOUSE_DB
        value: traffic
      - name: CLICKHOUSE_USER
        value: default
      - name: CLICKHOUSE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: traffic-credentials
            key: CLICKHOUSE_PASSWORD
      - name: FEATURE_SET_ID
        value: "{{workflow.parameters.feature-set-id}}"
      - name: TENANT_ID
        value: "{{workflow.parameters.tenant-id}}"
      - name: LOOKBACK_DAYS
        value: "{{workflow.parameters.lookback-days}}"
      - name: TEST_SIZE
        value: "{{workflow.parameters.test-size}}"
      - name: OUTPUT_DIR
        value: /tmp/mlops
    outputs:
      artifacts:
      - name: train-data
        path: /tmp/mlops/train.parquet
        s3:
          key: mlops/{{workflow.name}}/data/train.parquet
      - name: test-data
        path: /tmp/mlops/test.parquet
        s3:
          key: mlops/{{workflow.name}}/data/test.parquet
      - name: metadata
        path: /tmp/mlops/metadata.json
        s3:
          key: mlops/{{workflow.name}}/data/metadata.json

  - name: train-model
    inputs:
      artifacts:
      - name: train-data
        path: /tmp/data/train.parquet
      - name: metadata
        path: /tmp/data/metadata.json
    container:
      image: "{{workflow.parameters.trainer-image}}"
      imagePullPolicy: IfNotPresent
      command: ["python", "/app/scripts/train_model.py"]
      env:
      - name: MODEL_TYPE
        value: "{{workflow.parameters.model-type}}"
      - name: DATA_DIR
        value: /tmp/data
      - name: OUTPUT_DIR
        value: /tmp/model
    outputs:
      artifacts:
      - name: model-file
        path: /tmp/model/model.json
        s3:
          key: mlops/{{workflow.name}}/model/model.json
      - name: feature-columns
        path: /tmp/model/feature_columns.json
        s3:
          key: mlops/{{workflow.name}}/model/feature_columns.json
      - name: feature-importance
        path: /tmp/model/feature_importance.json
        s3:
          key: mlops/{{workflow.name}}/model/feature_importance.json
      - name: train-metrics
        path: /tmp/model/train_metrics.json
        s3:
          key: mlops/{{workflow.name}}/model/train_metrics.json

  - name: evaluate-model
    inputs:
      artifacts:
      - name: model-file
        path: /tmp/model/model.json
      - name: test-data
        path: /tmp/data/test.parquet
      - name: metadata
        path: /tmp/data/metadata.json
    container:
      image: "{{workflow.parameters.trainer-image}}"
      imagePullPolicy: IfNotPresent
      command: ["python", "/app/scripts/evaluate_model.py"]
      env:
      - name: MODEL_TYPE
        value: "{{workflow.parameters.model-type}}"
      - name: MODEL_DIR
        value: /tmp/model
      - name: DATA_DIR
        value: /tmp/data
      - name: OUTPUT_DIR
        value: /tmp/evaluation
      - name: MIN_F1_SCORE
        value: "{{workflow.parameters.min-f1-score}}"
    outputs:
      parameters:
      - name: f1-score
        valueFrom:
          path: /tmp/evaluation/f1_score.txt
      artifacts:
      - name: metrics
        path: /tmp/evaluation/metrics.json
        s3:
          key: mlops/{{workflow.name}}/evaluation/metrics.json
      - name: summary
        path: /tmp/evaluation/summary.json
        s3:
          key: mlops/{{workflow.name}}/evaluation/summary.json
      - name: error-analysis
        path: /tmp/evaluation/error_analysis.json
        s3:
          key: mlops/{{workflow.name}}/evaluation/error_analysis.json

  - name: register-model
    inputs:
      artifacts:
      - name: model-file
        path: /model/model.json
      - name: feature-columns
        path: /model/feature_columns.json
      - name: feature-importance
        path: /model/feature_importance.json
      - name: train-metrics
        path: /model/train_metrics.json
      - name: eval-metrics
        path: /metrics/metrics.json
    container:
      image: "{{workflow.parameters.trainer-image}}"
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c"]
      args:
      - |
        set -eu
        python /app/scripts/register_model.py \
          --metrics "$(cat /metrics/metrics.json)" \
          --model-id "{{workflow.parameters.model-id}}" \
          --model-type "{{workflow.parameters.model-type}}"
      env:
      - name: MODEL_DIR
        value: /model
      - name: FEATURE_SET_ID
        value: "{{workflow.parameters.feature-set-id}}"
      - name: TENANT_ID
        value: "{{workflow.parameters.tenant-id}}"
      - name: MODEL_VERSION
        value: "{{workflow.name}}"
      - name: AUTO_ACTIVATE
        value: "{{workflow.parameters.auto-activate}}"
      - name: MINIO_ENDPOINT
        value: minio.minio.svc:9000
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: traffic-credentials
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: traffic-credentials
            key: MINIO_SECRET_KEY
      - name: MINIO_BUCKET
        value: traffic-models
      - name: MODEL_REGISTRY_URL
        value: http://rule-manager.traffic-analysis.svc:8084
      - name: API_TOKEN
        valueFrom:
          secretKeyRef:
            name: mlops-api-token
            key: token
            optional: true
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: kafka-bootstrap.middleware.svc:9092
      - name: MODEL_UPDATE_TOPIC
        value: model-updates
      - name: NOTIFICATION_METHOD
        value: none
