apiVersion: v1
kind: Service
metadata:
  labels:
    app: nebula
    component: meta
  name: nebula-meta
  namespace: middleware
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: thrift
    port: 9559
    protocol: TCP
    targetPort: 9559
  - name: http
    port: 19559
    protocol: TCP
    targetPort: 19559
  publishNotReadyAddresses: true
  selector:
    app: nebula
    component: meta
  sessionAffinity: None
  type: ClusterIP

