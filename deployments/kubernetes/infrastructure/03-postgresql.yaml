---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: databases
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
