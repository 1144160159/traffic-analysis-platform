---
# 网关与认证服务 — Nacos + APISIX + Keycloak + Argo
---
# Nacos 2.3 配置中心
apiVersion: v1
kind: Service
metadata: {name: nacos, namespace: middleware}
spec:
  ports:
  - {name: http, port: 8848}
  - {name: grpc, port: 9848}
  selector: {app: nacos}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: nacos, namespace: middleware}
spec:
  replicas: 1
  selector: {matchLabels: {app: nacos}}
  template:
    metadata: {labels: {app: nacos}}
    spec:
      containers:
      - name: nacos
        image: nacos/nacos-server:v2.3.2
        env:
        - {name: MODE, value: "standalone"}
        - {name: PREFER_HOST_MODE, value: "hostname"}
        ports: [{containerPort: 8848}, {containerPort: 9848}]
        resources: {requests: {cpu: 500m, memory: 1Gi}, limits: {cpu: "1", memory: 2Gi}}
---
# APISIX 3.9 API 网关 (standalone 模式, ConfigMap 驱动)
# 统一路由: 基础设施 UI(10条) + 业务 API(预配置)
---
# Gateway Service (NodePort, 外部入口)
apiVersion: v1
kind: Service
metadata: {name: apisix, namespace: gateway}
spec:
  type: NodePort
  selector: {app: apisix}
  ports:
  - {name: http, port: 9080, targetPort: 9080}
  - {name: admin, port: 9180, targetPort: 9180}
---
# Headless Service (StatefulSet 必需)
apiVersion: v1
kind: Service
metadata: {name: apisix-headless, namespace: gateway}
spec:
  clusterIP: None
  selector: {app: apisix}
  ports:
  - {name: http, port: 9080}
  - {name: admin, port: 9180}
---
# StatefulSet (ConfigMap 目录挂载, 无资源限制避免 OOM)
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: apisix, namespace: gateway}
spec:
  replicas: 1
  selector: {matchLabels: {app: apisix}}
  serviceName: apisix-headless
  template:
    metadata: {labels: {app: apisix}}
    spec:
      containers:
      - name: apisix
        image: apache/apisix:3.9.0-debian
        command: ["sh", "-c"]
        args:
        - |
          cp /standalone-config/config.yaml  /usr/local/apisix/conf/config.yaml
          cp /standalone-config/apisix.yaml /usr/local/apisix/conf/apisix.yaml
          # Inject APISIX admin_key from K8s Secret (replace placeholder in config.yaml)
          if [ -n "${APISIX_ADMIN_KEY}" ]; then
            sed -i "s/__APISIX_ADMIN_KEY__/${APISIX_ADMIN_KEY}/g" /usr/local/apisix/conf/config.yaml
          fi
          /usr/bin/apisix init
          exec /usr/local/openresty/bin/openresty -p /usr/local/apisix -g 'daemon off;'
        ports:
        - {containerPort: 9080, name: http}
        - {containerPort: 9180, name: admin}
        env:
        - {name: APISIX_STAND_ALONE, value: "true"}
        - {name: APISIX_ADMIN_KEY, valueFrom: {secretKeyRef: {name: traffic-credentials, key: APISIX_ADMIN_KEY}}}
        volumeMounts:
        - {name: apisix-config, mountPath: /standalone-config}
      volumes:
      - name: apisix-config
        configMap:
          name: apisix-routes
---
# Keycloak 24 SSO
apiVersion: v1
kind: Service
metadata: {name: keycloak, namespace: middleware}
spec:
  ports:
  - {name: http, port: 8080}
  selector: {app: keycloak}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: keycloak, namespace: middleware}
spec:
  replicas: 1
  selector: {matchLabels: {app: keycloak}}
  template:
    metadata: {labels: {app: keycloak}}
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0
        command: ["/opt/keycloak/bin/kc.sh", "start-dev"]
        env:
        - {name: KEYCLOAK_ADMIN, value: "admin"}
        - {name: KEYCLOAK_ADMIN_PASSWORD, value: "admin123"}
        ports: [{containerPort: 8080}]
        resources: {requests: {cpu: "1", memory: 1Gi}, limits: {cpu: "2", memory: 2Gi}}
---
# Argo Workflows 3.5
apiVersion: v1
kind: Service
metadata: {name: argo-server, namespace: middleware}
spec:
  ports:
  - {name: web, port: 2746}
  selector: {app: argo-server}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: argo-server, namespace: middleware}
spec:
  replicas: 1
  selector: {matchLabels: {app: argo-server}}
  template:
    metadata: {labels: {app: argo-server}}
    spec:
      containers:
      - name: argo-server
        image: argoproj/argocli:v3.5.5
        args: ["server", "--auth-mode=server"]
        ports: [{containerPort: 2746}]
        resources: {requests: {cpu: 200m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
