---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-2
  namespace: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
      instance: ch-2
  serviceName: clickhouse-2
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: clickhouse
        instance: ch-2
    spec:
      containers:
      - env:
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: CLICKHOUSE_PASSWORD
              name: traffic-credentials
        image: clickhouse/clickhouse-server:24.3
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 8123
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        name: clickhouse
        ports:
        - containerPort: 8123
          protocol: TCP
        - containerPort: 9000
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 8123
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '16'
            memory: 64Gi
          requests:
            cpu: '2'
            memory: 4Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /var/lib/clickhouse
          name: data
        - mountPath: /etc/clickhouse-server/config.d/cluster.xml
          name: config
          subPath: cluster.xml
      - args:
        - "SHARD=\"2\"\nPOD_NAME=$(hostname)\nREPLICA=$(echo $POD_NAME | sed \"s/.*-//\"\
          )\nmkdir -p /etc/clickhouse-server/config.d\ncat > /etc/clickhouse-server/config.d/macros.xml\
          \ << XMLEOF\n<clickhouse>\n  <macros>\n    <shard>${SHARD}</shard>\n   \
          \ <replica>replica_${SHARD}_${REPLICA}</replica>\n    <cluster>traffic_cluster</cluster>\n\
          \  </macros>\n</clickhouse>\nXMLEOF\ncp /etc/clickhouse-server/config.d/macros.xml\
          \ /shared/"
        command:
        - sh
        - -c
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        name: ch-macro-sidecar
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /shared
          name: ch-macros
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.io/hostname: zeus-server
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: clickhouse-config
        name: config
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      creationTimestamp: null
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Ti
      selector:
        matchLabels:
          app: clickhouse
      storageClassName: local-hdd
      volumeMode: Filesystem
    status:
      phase: Pending

