---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-graph
  namespace: middleware
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nebula
      component: graph
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: nebula
        component: graph
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: nebula-primary
                operator: In
                values:
                - 'true'
            weight: 100
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: nebula
                  component: graph
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - "echo \"--meta_server_addrs=nebula-meta-0.nebula-meta.middleware.svc:9559,nebula-meta-1.nebula-meta.middleware.svc:9559,nebula-meta-2.nebula-meta.middleware.svc:9559\n\
          --local_ip=${POD_IP}\n--port=9669\n--ws_http_port=19669\n--log_dir=/data/logs\n\
          --v=1\" > /tmp/graphd.conf\nwhile true; do\n  echo \"$(date +%T) Starting\
          \ graphd...\"\n  /usr/local/nebula/bin/nebula-graphd --flagfile=/tmp/graphd.conf\
          \ 2>&1\n  echo \"$(date +%T) graphd exited($?), restart in 5s...\"\n  sleep\
          \ 5\ndone\n"
        command:
        - /bin/sh
        - -c
        env:
        - name: USER
          value: root
        - name: TZ
          value: Asia/Shanghai
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        image: vesoft/nebula-graphd:v3.6.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 15
          successThreshold: 1
          tcpSocket:
            port: 9669
          timeoutSeconds: 1
        name: graphd
        ports:
        - containerPort: 9669
          protocol: TCP
        - containerPort: 19669
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 9669
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '4'
            memory: 8Gi
          requests:
            cpu: '2'
            memory: 4Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - emptyDir: {}
        name: data

