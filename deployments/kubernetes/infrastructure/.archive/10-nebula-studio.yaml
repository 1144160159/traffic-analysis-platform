---
# NebulaGraph Studio — Web 管理控制台 (NodePort 外部访问)
# 提供 Schema 管理、nGQL 查询、数据导入、图可视化
# 外部访问: http://10.0.5.8:30701
apiVersion: v1
kind: Service
metadata:
  name: nebula-studio
  namespace: middleware
  labels: {app: nebula-studio}
spec:
  type: NodePort
  selector: {app: nebula-studio}
  ports:
  - {name: http, port: 7001, targetPort: 7001, nodePort: 30701}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nebula-studio
  namespace: middleware
  labels: {app: nebula-studio}
spec:
  replicas: 1
  selector: {matchLabels: {app: nebula-studio}}
  template:
    metadata: {labels: {app: nebula-studio}}
    spec:
      containers:
      - name: studio
        image: vesoft/nebula-graph-studio:v3.10.0
        ports: [{containerPort: 7001}]
        env:
        - {name: USER, value: "root"}
        - {name: TZ, value: "Asia/Shanghai"}
        resources: {requests: {cpu: 200m, memory: 512Mi}, limits: {cpu: "1", memory: 1Gi}}
        livenessProbe:
          httpGet: {path: /, port: 7001}
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet: {path: /, port: 7001}
          initialDelaySeconds: 10
          periodSeconds: 10
