---
# OpenSearch 2.14 — 3 节点集群
# API: opensearch.middleware.svc:9200 (10.0.5.214)
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: middleware
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.5.214
  ports:
  - {name: http, port: 9200}
  - {name: transport, port: 9300}
  selector: {app: opensearch}
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-headless
  namespace: middleware
spec:
  clusterIP: None
  ports:
  - {name: http, port: 9200}
  - {name: transport, port: 9300}
  selector: {app: opensearch}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch-pdb
  namespace: middleware
spec:
  maxUnavailable: 1
  selector:
    matchLabels: {app: opensearch}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: middleware
spec:
  serviceName: opensearch-headless
  replicas: 3
  selector:
    matchLabels: {app: opensearch}
  template:
    metadata:
      labels: {app: opensearch}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector: {matchLabels: {app: opensearch}}
            topologyKey: kubernetes.io/hostname
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:2.14.0
        env:
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms4g -Xmx4g"
        - name: discovery.seed_hosts
          value: "opensearch-0.opensearch-headless,opensearch-1.opensearch-headless,opensearch-2.opensearch-headless"
        - name: cluster.initial_master_nodes
          value: "opensearch-0,opensearch-1,opensearch-2"
        - name: cluster.name
          value: "traffic-os"
        - name: network.host
          value: "0.0.0.0"
        - name: plugins.security.disabled
          value: "true"
        - name: DISABLE_INSTALL_DEMO_CONFIG
          value: "true"
        ports:
        - {containerPort: 9200}
        - {containerPort: 9300}
        resources:
          requests: {cpu: "4", memory: "8Gi"}
          limits:   {cpu: "8", memory: "16Gi"}
        livenessProbe:
          httpGet: {path: /_cluster/health, port: 9200}
          initialDelaySeconds: 60
          periodSeconds: 15
        volumeMounts:
        - {name: os-data, mountPath: /usr/share/opensearch/data}
  volumeClaimTemplates:
  - metadata: {name: os-data}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-hdd
      resources: {requests: {storage: 2Ti}}
