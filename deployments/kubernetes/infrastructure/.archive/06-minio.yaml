---
# MinIO 4-Drive 分布式 — 2 节点各 2 盘
# S3 API: 10.0.5.200:9000, Console: 10.0.5.200:9001
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: middleware
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.5.200
  ports:
  - {name: api, port: 9000}
  - {name: console, port: 9001}
  selector: {app: minio}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: middleware
spec:
  clusterIP: None
  ports:
  - {name: api, port: 9000}
  selector: {app: minio}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio-pdb
  namespace: middleware
spec:
  maxUnavailable: 1
  selector:
    matchLabels: {app: minio}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: middleware
spec:
  serviceName: minio-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels: {app: minio}
  template:
    metadata:
      labels: {app: minio}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector: {matchLabels: {app: minio}}
            topologyKey: kubernetes.io/hostname
      containers:
      - name: minio
        image: minio/minio:latest
        command: ["minio"]
        args:
        - "server"
        - "--address"
        - ":9000"
        - "--console-address"
        - ":9001"
        - "http://minio-{0...1}.minio-headless.middleware.svc/export-{0...1}"
        env:
        - name: MINIO_ROOT_USER
          value: "admin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin123"
        - name: MINIO_STORAGE_CLASS_STANDARD
          value: "EC:2"
        ports:
        - {containerPort: 9000}
        - {containerPort: 9001}
        resources:
          requests: {cpu: "2", memory: "4Gi"}
          limits:   {cpu: "4", memory: "8Gi"}
        livenessProbe:
          httpGet: {path: /minio/health/live, port: 9000}
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - {name: minio-data-0, mountPath: /export-0}
        - {name: minio-data-1, mountPath: /export-1}
  volumeClaimTemplates:
  - metadata: {name: minio-data-0}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-hdd
      resources: {requests: {storage: 50Ti}}
  - metadata: {name: minio-data-1}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-hdd
      resources: {requests: {storage: 50Ti}}
