---
# Redis 7 Sentinel — 1 Master + 2 Replica + 3 Sentinel
# Master: redis-master.databases.svc (10.0.5.202)
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: databases
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.5.202
  ports:
  - {port: 6379}
  selector: {app: redis, role: master}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel-svc
  namespace: databases
spec:
  ports:
  - {port: 26379}
  selector: {app: redis-sentinel}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: databases
spec:
  clusterIP: None
  ports:
  - {port: 6379}
  selector: {app: redis}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-pdb
  namespace: databases
spec:
  maxUnavailable: 1
  selector:
    matchLabels: {app: redis}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: databases
spec:
  serviceName: redis-headless
  replicas: 3
  selector:
    matchLabels: {app: redis}
  template:
    metadata:
      labels: {app: redis}
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server"]
        args:
        - "--appendonly yes"
        - "--maxmemory 4gb"
        - "--maxmemory-policy allkeys-lru"
        - "--replica-read-only yes"
        - "--replica-priority 100"
        - "--slave-announce-ip $(MY_POD_IP)"
        - "--masterauth ${REDIS_PASSWORD:-}"
        - "--requirepass ${REDIS_PASSWORD:-}"
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: REDIS_PASSWORD
          valueFrom: {secretKeyRef: {name: traffic-credentials, key: REDIS_PASSWORD}}
        ports:
        - {containerPort: 6379}
        resources:
          requests: {cpu: "1", memory: "2Gi"}
          limits:   {cpu: "2", memory: "4Gi"}
        livenessProbe:
          tcpSocket: {port: 6379}
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - {name: redis-data, mountPath: /data}
  volumeClaimTemplates:
  - metadata: {name: redis-data}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-hdd
      resources: {requests: {storage: 100Gi}}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-sentinel
  namespace: databases
spec:
  serviceName: redis-sentinel-svc
  replicas: 3
  selector:
    matchLabels: {app: redis-sentinel}
  template:
    metadata:
      labels: {app: redis-sentinel}
    spec:
      containers:
      - name: sentinel
        image: redis:7-alpine
        command: ["redis-sentinel"]
        args: ["/etc/redis/sentinel.conf"]
        ports:
        - {containerPort: 26379}
        resources:
          requests: {cpu: 100m, memory: 128Mi}
          limits:   {cpu: 200m, memory: 256Mi}
