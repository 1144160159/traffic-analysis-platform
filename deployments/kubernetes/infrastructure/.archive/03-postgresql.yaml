---
# PostgreSQL 16 — 1 Primary + 2 Replica
# Primary: postgres-primary.databases.svc (10.0.5.203)
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: databases
spec:
  type: LoadBalancer
  loadBalancerIP: 10.0.5.203
  ports:
  - {port: 5432, targetPort: 5432}
  selector: {app: postgres, role: primary}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: databases
spec:
  ports:
  - {port: 5432}
  selector: {app: postgres, role: replica}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: databases
spec:
  clusterIP: None
  ports:
  - {port: 5432}
  selector: {app: postgres}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: databases
spec:
  maxUnavailable: 1
  selector:
    matchLabels: {app: postgres}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: databases
spec:
  serviceName: postgres-headless
  replicas: 3
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "pgadmin123"
        - name: POSTGRES_DB
          value: "traffic_platform"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        ports:
        - {containerPort: 5432}
        resources:
          requests: {cpu: "2", memory: "4Gi"}
          limits:   {cpu: "4", memory: "8Gi"}
        livenessProbe:
          tcpSocket: {port: 5432}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket: {port: 5432}
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - {name: pg-data, mountPath: /var/lib/postgresql/data}
  volumeClaimTemplates:
  - metadata: {name: pg-data}
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-hdd
      resources: {requests: {storage: 500Gi}}
