apiVersion: v1
data:
  default.conf: |
    server {
        listen 7002;
        server_name _;
        location / {
            proxy_pass http://nebula-studio.middleware.svc:7001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            sub_filter_types text/html application/javascript text/javascript text/css;
            # CSS url() asset paths (no quotes)
            sub_filter 'url(/assets/' 'url(/nebula/assets/';
            sub_filter_once off;
            # Generic: catch ALL "/assets/ references (JS strings, workers, etc.)
            sub_filter '"/assets/' '"/nebula/assets/';
            # Relative asset paths (Vite preload deps: "assets/ -> "nebula/assets/)
            sub_filter '"assets/' '"nebula/assets/';
            # HTML attributes (belt-and-suspenders, may be redundant with above)
            sub_filter 'src="/assets/'  'src="/nebula/assets/';
            sub_filter 'href="/assets/'  'href="/nebula/assets/';
            # JS API paths (api-nebula first to avoid /api/ false match)
            sub_filter '"/api-nebula/' '"/nebula/api-nebula/';
            sub_filter '"/api/' '"/nebula/api/';
            # JS hardcoded redirect/login paths
            sub_filter '"/login' '"/nebula/login';
            sub_filter '"/redirect' '"/nebula/redirect';
        }
    }
kind: ConfigMap
metadata:
