# =============================================================================
# Replica Set — clickhouse-replica (1 per shard)
#   replica-0 → Shard 01 (replica-2)
#   replica-1 → Shard 02 (replica-2)
# =============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-replica
  namespace: middleware
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: http
    port: 8123
    protocol: TCP
    targetPort: 8123
  - name: native
    port: 9000
    protocol: TCP
    targetPort: 9000
  - name: interserver
    port: 9009
    protocol: TCP
    targetPort: 9009
  selector:
    app: clickhouse
    role: replica
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse-replica
  namespace: middleware
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: clickhouse
      role: replica
  serviceName: clickhouse-replica
  template:
    metadata:
      labels:
        app: clickhouse
        role: replica
    spec:
      initContainers:
      - command:
        - sh
        - -c
        - |
          REPLICA_ID=$((${HOSTNAME##*-} + 1))
          SHARD_ID=1
          if [ "$REPLICA_ID" = "2" ]; then SHARD_ID=2; fi
          sed "s|__CLICKHOUSE_PASSWORD__|${CLICKHOUSE_PASSWORD}|g" /config-src/cluster.xml > /ch-config/cluster.xml
          cp /config-src/resource-limits.xml /ch-config/resource-limits.xml
          cat > /ch-config/docker_related_config.xml << XEOF
          <clickhouse>
            <listen_host>::</listen_host>
            <listen_host>0.0.0.0</listen_host>
            <listen_try>1</listen_try>
          </clickhouse>
          XEOF
          cat > /ch-config/macros.xml << XEOF
          <clickhouse>
            <macros>
              <shard>0${SHARD_ID}</shard>
              <replica>replica-2</replica>
              <cluster>traffic_cluster</cluster>
            </macros>
          </clickhouse>
          XEOF
          echo "Init: shard=0${SHARD_ID} replica=replica-2"
          ls -la /ch-config/
        env:
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: CLICKHOUSE_PASSWORD
              name: traffic-credentials
        image: docker.io/library/busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        imagePullPolicy: IfNotPresent
        name: ch-init
        resources: {}
        volumeMounts:
        - mountPath: /config-src
          name: config
        - mountPath: /ch-config
          name: ch-config
      containers:
      - env:
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: CLICKHOUSE_PASSWORD
              name: traffic-credentials
        image: docker.io/clickhouse/clickhouse-server@sha256:b052ae89097c2d0f718b15ba1f4ce1c2a781eda8375980cf1cddd8f203981b58
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 8123
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 1
        name: clickhouse
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        - containerPort: 9000
          name: native
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /ping
            port: 8123
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '16'
            memory: 24Gi
          requests:
            cpu: '2'
            memory: 4Gi
        volumeMounts:
        - mountPath: /var/lib/clickhouse
          name: data
        - mountPath: /etc/clickhouse-server/config.d
          name: ch-config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - configMap:
          defaultMode: 420
          name: clickhouse-config
        name: config
      - emptyDir: {}
        name: ch-config
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Ti
      selector:
        matchLabels:
          app: clickhouse-replica
      storageClassName: local-hdd
      volumeMode: Filesystem

