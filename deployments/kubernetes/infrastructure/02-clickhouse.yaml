# =============================================================================
# PodDisruptionBudget
# =============================================================================

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: clickhouse-pdb
  namespace: middleware
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: clickhouse

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: clickhouse-keeper-pdb
  namespace: middleware
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: clickhouse-keeper
