apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: apisix
  namespace: gateway
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: apisix
  serviceName: apisix-headless
  template:
    metadata:
      labels:
        app: apisix
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: apisix
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - "cp /standalone-config/config.yaml  /usr/local/apisix/conf/config.yaml\ncp /standalone-config/apisix.yaml /usr/local/apisix/conf/apisix.yaml\n\
          # Inject APISIX admin_key from K8s Secret (replace placeholder in config.yaml)\nif [ -n \"${APISIX_ADMIN_KEY}\"\
          \ ]; then\n  sed -i \"s/__APISIX_ADMIN_KEY__/${APISIX_ADMIN_KEY}/g\" /usr/local/apisix/conf/config.yaml\nfi\n/usr/bin/apisix\
          \ init\nexec /usr/local/openresty/bin/openresty -p /usr/local/apisix -g 'daemon off;'\n"
        command:
        - sh
        - -c
        env:
        - name: APISIX_STAND_ALONE
          value: 'true'
        - name: APISIX_ADMIN_KEY
          valueFrom:
            secretKeyRef:
              key: APISIX_ADMIN_KEY
              name: traffic-credentials
        image: docker.io/apache/apisix@sha256:d3de70b3ea6f29fc0d2d812649c0e4be20ba6c00357e839311eae57ba6bc0059
        imagePullPolicy: IfNotPresent
        name: apisix
        ports:
        - containerPort: 9080
          name: http
          protocol: TCP
        - containerPort: 9180
          name: admin
          protocol: TCP
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /standalone-config
          name: apisix-config
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - configMap:
          defaultMode: 420
          name: apisix-routes
        name: apisix-config
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate

---
apiVersion: v1
kind: Service
metadata:
  name: apisix
  namespace: gateway
spec:
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    nodePort: 30180
    port: 9080
    protocol: TCP
    targetPort: 9080
  selector:
    app: apisix
  sessionAffinity: None
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: apisix-admin
  namespace: gateway
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: admin
    port: 9180
    protocol: TCP
    targetPort: 9180
  selector:
    app: apisix
  sessionAffinity: None
  type: ClusterIP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: iam
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: keycloak
  serviceName: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: keycloak
            topologyKey: kubernetes.io/hostname
      containers:
      - args:
        - start
        env:
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: traffic-credentials
              key: KEYCLOAK_ADMIN_PASSWORD
        - name: KC_HOSTNAME_STRICT
          value: 'false'
        - name: KC_HOSTNAME_URL
          value: http://10.0.5.8:30180
        - name: KC_HOSTNAME_ADMIN_URL
          value: http://10.0.5.8:30180
        - name: KC_PROXY_HEADERS
          value: xforwarded
        - name: KC_HEALTH_ENABLED
          value: 'true'
        - name: KC_HTTPS_CERTIFICATE_FILE
          value: /etc/keycloak/tls/tls.crt
        - name: KC_HTTPS_CERTIFICATE_KEY_FILE
          value: /etc/keycloak/tls/tls.key
        image: quay.io/keycloak/keycloak@sha256:f8ade94c1d0ad2f2fa7734a455fee5392764f402c43ca35e9af6bf63a2541dc9
        imagePullPolicy: IfNotPresent
        name: keycloak
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 10
          failureThreshold: 18
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 240
          periodSeconds: 20
          failureThreshold: 6
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - name: keycloak-tls
          mountPath: /etc/keycloak/tls
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - name: keycloak-tls
        secret:
          secretName: keycloak-tls
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: iam
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app: keycloak
  sessionAffinity: None
  type: ClusterIP

---
