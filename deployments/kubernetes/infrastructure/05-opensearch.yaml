apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: middleware
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: opensearch
  serviceName: opensearch
  template:
    metadata:
      labels:
        app: opensearch
    spec:
      containers:
      - env:
        - name: cluster.name
          value: traffic-os
        - name: node.name
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: discovery.seed_hosts
          value: opensearch-0.opensearch.middleware.svc,opensearch-1.opensearch.middleware.svc,opensearch-2.opensearch.middleware.svc
        - name: cluster.initial_cluster_manager_nodes
          value: opensearch-0,opensearch-1,opensearch-2
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: traffic-credentials
              key: OPENSEARCH_ADMIN_PASSWORD
        - name: plugins.security.ssl.http.enabled
          value: 'false'
        - name: network.host
          value: 0.0.0.0
        - name: OPENSEARCH_JAVA_OPTS
          value: -Xms2g -Xmx2g
        image: docker.io/opensearchproject/opensearch@sha256:61846553903d59d51914afbc31eae4653111b585d7ca7b2a1da91c5e8b897b28
        imagePullPolicy: IfNotPresent
        livenessProbe:
          exec:
            command:
            - sh
            - -ec
            - curl -fsS -u "admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" "http://127.0.0.1:9200/_cluster/health" >/dev/null
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 20
          successThreshold: 1
          timeoutSeconds: 5
        name: opensearch
        ports:
        - containerPort: 9200
          protocol: TCP
        - containerPort: 9300
          protocol: TCP
        readinessProbe:
          exec:
            command:
            - sh
            - -ec
            - curl -fsS -u "admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD}" "http://127.0.0.1:9200/_cluster/health?local=true" >/dev/null
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 5
        resources:
          limits:
            cpu: '8'
            memory: 8Gi
          requests:
            cpu: '2'
            memory: 3Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /usr/share/opensearch/data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Ti
      selector:
        matchLabels:
          app: opensearch
      storageClassName: local-hdd
      volumeMode: Filesystem

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: middleware
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 9200
    protocol: TCP
    targetPort: 9200
  selector:
    app: opensearch
  sessionAffinity: None
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-1
  namespace: middleware
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 9200
    protocol: TCP
    targetPort: 9200
  - name: metrics
    port: 9600
    protocol: TCP
    targetPort: 9600
  selector:
    app: opensearch
    instance: os-1
  sessionAffinity: None
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: opensearch-2
  namespace: middleware
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 9200
    protocol: TCP
    targetPort: 9200
  - name: metrics
    port: 9600
    protocol: TCP
    targetPort: 9600
  selector:
    app: opensearch
    instance: os-2
  sessionAffinity: None
  type: ClusterIP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opensearch-pdb
  namespace: middleware
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: opensearch

---
