apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nebula-storage
  namespace: middleware
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: nebula
      component: storage
  serviceName: nebula-storage-headless
  template:
    metadata:
      labels:
        app: nebula
        component: storage
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: nebula
                  component: storage
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - "echo \"--meta_server_addrs=nebula-meta-0.nebula-meta.middleware.svc:9559,nebula-meta-1.nebula-meta.middleware.svc:9559,nebula-meta-2.nebula-meta.middleware.svc:9559\n\
          --local_ip=$(POD_NAME).nebula-storage-headless.middleware.svc\n--port=9777\n--ws_http_port=19779\n--data_path=/data/storage\n\
          --log_dir=/data/logs\n--v=1\" > /tmp/storaged.conf\nwhile true; do\n  echo \"$(date +%T) Starting storaged...\"\n\
          \  rm -f /usr/local/nebula/pids/nebula-storaged.pid\n  kill -9 $(pgrep nebula-storaged) 2>/dev/null; sleep 2\n \
          \ /usr/local/nebula/bin/nebula-storaged --flagfile=/tmp/storaged.conf 2>&1\n  echo \"$(date +%T) storaged exited($?),\
          \ restart in 10s...\"\n  sleep 10\ndone\n"
        command:
        - /bin/sh
        - -c
        env:
        - name: USER
          value: root
        - name: META_ADDRS
          value: nebula-meta-0.nebula-meta.middleware.svc:9559,nebula-meta-1.nebula-meta.middleware.svc:9559,nebula-meta-2.nebula-meta.middleware.svc:9559
        - name: TZ
          value: Asia/Shanghai
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        image: docker.io/vesoft/nebula-storaged@sha256:29b9dccaecc339ed0e98b21575105eb45afc44afe84b8ca0cc9b0dca03c14fae
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 15
          successThreshold: 1
          tcpSocket:
            port: 9777
          timeoutSeconds: 1
        name: storaged
        ports:
        - containerPort: 9777
          protocol: TCP
        - containerPort: 9778
          protocol: TCP
        - containerPort: 19779
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 9777
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '4'
            memory: 10Gi
          requests:
            cpu: '2'
            memory: 4Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - mkdir -p /data/storage /data/logs
        env:
        - name: META_ADDRS
          value: nebula-meta-0.nebula-meta.middleware.svc:9559,nebula-meta-1.nebula-meta.middleware.svc:9559,nebula-meta-2.nebula-meta.middleware.svc:9559
        image: docker.io/library/busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        imagePullPolicy: IfNotPresent
        name: init-dirs
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: nebula
            component: storage
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 100Gi
      storageClassName: local-hdd
      volumeMode: Filesystem

