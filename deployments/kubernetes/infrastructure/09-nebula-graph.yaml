apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nebula-meta
  namespace: middleware
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: Parallel
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: nebula
      component: meta
  serviceName: nebula-meta
  template:
    metadata:
      labels:
        app: nebula
        component: meta
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - preference:
              matchExpressions:
              - key: nebula-primary
                operator: In
                values:
                - 'true'
            weight: 100
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: nebula
                  component: meta
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - args:
        - "echo \"--meta_server_addrs=nebula-meta-0.nebula-meta.middleware.svc:9559,nebula-meta-1.nebula-meta.middleware.svc:9559,nebula-meta-2.nebula-meta.middleware.svc:9559\n\
          --local_ip=$(POD_NAME).nebula-meta.middleware.svc\n--port=9559\n--ws_http_port=19559\n--data_path=/data/meta\n--log_dir=/data/logs\n\
          --v=1\" > /tmp/metad.conf\nwhile true; do\n  echo \"$(date +%T) Starting metad...\"\n  /usr/local/nebula/bin/nebula-metad\
          \ --flagfile=/tmp/metad.conf 2>&1\n  echo \"$(date +%T) metad exited($?), restart in 5s...\"\n  sleep 5\ndone\n"
        command:
        - /bin/sh
        - -c
        env:
        - name: USER
          value: root
        - name: TZ
          value: Asia/Shanghai
        - name: POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        image: docker.io/vesoft/nebula-metad@sha256:6d72a76fd44a738d1353186d8f2a8d467752239f4f85030f56c1b53b657b21d8
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 15
          successThreshold: 1
          tcpSocket:
            port: 9559
          timeoutSeconds: 1
        name: metad
        ports:
        - containerPort: 9559
          protocol: TCP
        - containerPort: 19559
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          initialDelaySeconds: 15
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 9559
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
          requests:
            cpu: '1'
            memory: 2Gi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
      storageClassName: local-hdd
      volumeMode: Filesystem

---
