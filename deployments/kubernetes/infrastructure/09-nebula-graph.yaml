          --local_ip=${POD_IP}\n--port=9669\n--ws_http_port=19669\n--log_dir=/data/logs\n--v=1\" > /tmp/graphd.conf\nwhile\
          \ true; do\n  echo \"$(date +%T) Starting graphd...\"\n  /usr/local/nebula/bin/nebula-graphd --flagfile=/tmp/graphd.conf\
