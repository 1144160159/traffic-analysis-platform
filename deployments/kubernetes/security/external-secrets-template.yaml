---
# Template only. Requires the External Secrets Operator CRDs and a real
# ClusterSecretStore named traffic-platform-secret-store backed by the external-secrets-source namespace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traffic-credentials
  namespace: middleware
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: traffic-platform-secret-store
    kind: ClusterSecretStore
  target:
    name: traffic-credentials
    creationPolicy: Owner
  data:
  - secretKey: CLICKHOUSE_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: CLICKHOUSE_PASSWORD}
  - secretKey: MINIO_ACCESS_KEY
    remoteRef: {key: traffic-platform-prod-credentials, property: MINIO_ACCESS_KEY}
  - secretKey: MINIO_SECRET_KEY
    remoteRef: {key: traffic-platform-prod-credentials, property: MINIO_SECRET_KEY}
  - secretKey: REDIS_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: REDIS_PASSWORD}
  - secretKey: PG_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: PG_PASSWORD}
  - secretKey: POSTGRES_DSN
    remoteRef: {key: traffic-platform-prod-credentials, property: POSTGRES_DSN}
  - secretKey: PG_REPLICATION_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: PG_REPLICATION_PASSWORD}
  - secretKey: JWT_SECRET
    remoteRef: {key: traffic-platform-prod-credentials, property: JWT_SECRET}
  - secretKey: OIDC_CLIENT_SECRET
    remoteRef: {key: traffic-platform-prod-credentials, property: OIDC_CLIENT_SECRET}
  - secretKey: APISIX_ADMIN_KEY
    remoteRef: {key: traffic-platform-prod-credentials, property: APISIX_ADMIN_KEY}
  - secretKey: OPENSEARCH_ADMIN_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: OPENSEARCH_ADMIN_PASSWORD}
  - secretKey: KAFKA_CLIENT_USERNAME
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_CLIENT_USERNAME}
  - secretKey: KAFKA_CLIENT_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_CLIENT_PASSWORD}
  - secretKey: KAFKA_CLIENT_JAAS_CONFIG
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_CLIENT_JAAS_CONFIG}
  - secretKey: KAFKA_INTER_BROKER_USERNAME
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_INTER_BROKER_USERNAME}
  - secretKey: KAFKA_INTER_BROKER_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_INTER_BROKER_PASSWORD}
  - secretKey: KAFKA_TLS_KEYSTORE_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_TLS_KEYSTORE_PASSWORD}
  - secretKey: KAFKA_TLS_TRUSTSTORE_PASSWORD
    remoteRef: {key: traffic-platform-prod-credentials, property: KAFKA_TLS_TRUSTSTORE_PASSWORD}
