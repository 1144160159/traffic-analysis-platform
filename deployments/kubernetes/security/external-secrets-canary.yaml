---
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-kubernetes-provider-canary-reader
  namespace: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-kubernetes-provider-canary-reader
  namespace: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-kubernetes-provider-canary-reader
  namespace: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-kubernetes-provider-canary-reader
subjects:
  - kind: ServiceAccount
    name: eso-kubernetes-provider-canary-reader
    namespace: external-secrets-canary
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: traffic-platform-canary-store
  namespace: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
spec:
  provider:
    kubernetes:
      remoteNamespace: external-secrets-canary
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-kubernetes-provider-canary-reader
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: traffic-platform-eso-canary
  namespace: external-secrets-canary
  labels:
    app.kubernetes.io/name: external-secrets-canary
    traffic-platform.io/security-profile: external-secrets-canary
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: traffic-platform-canary-store
    kind: SecretStore
  target:
    name: eso-canary-target
    creationPolicy: Owner
  data:
    - secretKey: canary-token
      remoteRef:
        key: eso-canary-source
        property: canary-token
