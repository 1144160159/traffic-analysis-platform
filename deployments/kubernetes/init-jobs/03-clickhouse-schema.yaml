          INSERT INTO traffic.entity_graph_nodes VALUES ('default','host:10.20.4.20','host','DB-SRV-01','10.20.4.20',71,'medium',78,46,'database','{"site":"main","operating_system":"CentOS Linux 8.5","asset_group":"核心业务区 / 数据库","owner":"数据库运行组","services":["TCP/3306"]}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','domain:erp.corp.edu.cn','domain','erp.corp.edu.cn','域名',58,'medium',28,72,'domain','{"site":"main","owner":"ERP应用组","resolver":"10.20.0.53"}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','service:crm:443','service','CRM服务','TCP/443',46,'low',56,68,'service','{"site":"main","owner":"CRM应用组","protocol":"HTTPS","port":443}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','evidence:PCAP-20260620-0156','evidence','PCAP-20260620-0156','PCAP证据',30,'low',48,84,'evidence','{"site":"main","owner":"流量取证系统","evidence_type":"pcap"}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','alert:ALERT-20260620-1287','alert','ALERT-20260620-1287','告警',88,'high',76,72,'alert','{"site":"main","owner":"检测运营中心","severity":"high"}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','service:backup:873','service','备份服务','TCP/873',42,'low',88,58,'service','{"site":"main","owner":"数据保护组","protocol":"RSYNC","port":873,"services":["TCP/873"]}',toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_nodes VALUES ('default','host:10.20.8.31','host','归档存储节点','10.20.8.31',38,'low',94,72,'host','{"site":"main","operating_system":"Rocky Linux 9.4","asset_group":"数据保护区 / 归档存储","owner":"数据保护组","services":["TCP/22","TCP/873"]}',toUnixTimestamp64Milli(now64()));

          INSERT INTO traffic.entity_graph_edges VALUES ('default','rel-001','ip:185.234.15.23','host:10.20.4.18','通信','high','PCAP-20260620-0156','{"protocol":"TCP","port":"443","service":"HTTPS","frequency":642,"bytes":"12.4 GB","latency_ms":18,"attack_stage":"初始访问","action":"外部通信"}',0.96,toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_edges VALUES ('default','rel-002','account:biz_admin','host:10.20.4.18','登录','low','AUDIT-GRAPH-0042','{"protocol":"RDP","port":"3389","service":"RDP","frequency":7,"bytes":"86 MB","latency_ms":24,"identity_label":"高权限","anomaly_reason":"非工作时间","attack_stage":"凭证访问"}',0.82,toUnixTimestamp64Milli(now64()));
          INSERT INTO traffic.entity_graph_edges VALUES ('default','rel-003','host:10.20.4.19','host:10.20.4.18','通信','low','SESSION-20260620-3381','{"protocol":"TCP","port":"3306","service":"MySQL","frequency":318,"bytes":"8.6 GB","latency_ms":23}',0.78,toUnixTimestamp64Milli(now64()));
