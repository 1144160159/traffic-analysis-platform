---
# Entity graph workbench seed/migration job.
#
# This is intentionally idempotent: NebulaGraph INSERT overwrites the same
# vertex/edge key, so the job can be rerun after schema upgrades. Production
# pipelines write the same generic entity/relation contract continuously.
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-nebula-workbench
  namespace: middleware
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-nebula
        image: busybox:1.36
        command: ["/bin/sh", "-c", "until nc -z nebula-graph.middleware.svc 9669; do sleep 3; done"]
      containers:
      - name: seed-workbench
        image: vesoft/nebula-console:v3.6.0
        env:
        - name: NEBULA_SERVICE_PASSWORD
          valueFrom: {secretKeyRef: {name: traffic-credentials, key: NEBULA_SERVICE_PASSWORD}}
