---
# Web UI — React + Vite 前端
---
apiVersion: v1
kind: Service
metadata: {name: web-ui, namespace: traffic-analysis, labels: {app: web-ui}}
spec:
  type: ClusterIP
  selector: {app: web-ui}
  ports:
  - {name: http, port: 80, targetPort: 80}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: traffic-analysis
  annotations:
    kubernetes.io/change-cause: "Campaigns r725 uses the AppShell public business-area spacing and keeps the ECharts graph nodes inside the chart viewport"
    traffic.analysis/source-revision: "2f8bafc7f356e3df100f709099a8d991a370802211ec74b98bec4495a87657cd"
spec:
  replicas: 1
  selector: {matchLabels: {app: web-ui}}
  template:
    metadata:
      labels: {app: web-ui}
      annotations:
        traffic.analysis/build-id: "campaigns-r725"
        traffic.analysis/release: "campaigns-r725"
        traffic.analysis/source-digest: "2f8bafc7f356e3df100f709099a8d991a370802211ec74b98bec4495a87657cd"
        traffic.analysis/image-digest: "sha256:dfe87ddcd728bd89d6104d7d920a799a1a88d597a507c6bebc621e65702faffb"
        traffic.analysis/image-id: "sha256:1ee615e84e4cef8234e8382d75e399b30811acd3636283a40e312d66d7d69884"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: web-ui
        image: docker.io/traffic/web-ui@sha256:dfe87ddcd728bd89d6104d7d920a799a1a88d597a507c6bebc621e65702faffb
        imagePullPolicy: Never
        ports: [{containerPort: 80}]
        lifecycle:
          preStop:
            exec: {command: ["/bin/sh", "-c", "sleep 10"]}
        env:
        - {name: API_BASE_URL, value: "/api"}
        - {name: API_BACKEND_HOST, value: "apisix.gateway.svc"}
        - {name: API_BACKEND_PORT, value: "9080"}
        - {name: WS_URL, value: "/ws/events"}
        - {name: WS_BACKEND_HOST, value: "apisix.gateway.svc"}
        - {name: WS_BACKEND_PORT, value: "9080"}
        - {name: VITE_ENABLE_WEBSOCKET, value: "true"}
        - {name: ENABLE_REALTIME, value: "true"}
        - {name: AUTH_ENABLED, value: "true"}
        - {name: USE_MOCK, value: "false"}
        - {name: ALERT_DETAIL_API_ENABLED, value: "false"}
        - {name: SCREEN_ACCESS_MODE, value: "protected"}
        - {name: DESKTOP_SMOKE_TOKEN_ENABLED, value: "true"}
        resources: {requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 128Mi}, limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 512Mi}}
        livenessProbe:  {httpGet: {path: /, port: 80}, initialDelaySeconds: 10, periodSeconds: 15}
        readinessProbe: {httpGet: {path: /, port: 80}, initialDelaySeconds: 5, periodSeconds: 10}
