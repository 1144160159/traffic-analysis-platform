---
# Web UI — React + Vite 前端
---
apiVersion: v1
kind: Service
metadata: {name: web-ui, namespace: traffic-analysis, labels: {app: web-ui}}
spec:
  type: ClusterIP
  selector: {app: web-ui}
  ports:
  - {name: http, port: 80, targetPort: 80}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: traffic-analysis
  annotations:
    kubernetes.io/change-cause: "MLOps version-history trend and r333 Windows Chrome acceptance"
    traffic.analysis/source-revision: "9715ff1904701d1ab1930309eca54ec2121999ab1f43c00cc14adceee9c8d309"
spec:
  replicas: 1
  selector: {matchLabels: {app: web-ui}}
  template:
    metadata:
      labels: {app: web-ui}
      annotations:
        traffic.analysis/build-id: "mlops-r333-20260719-r5"
        traffic.analysis/source-digest: "9715ff1904701d1ab1930309eca54ec2121999ab1f43c00cc14adceee9c8d309"
        traffic.analysis/image-digest: "sha256:7ded10737d650ce698dbbcfbeb3595375fac4fe3d9a98d0615fd028ba518eff3"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: web-ui
        image: docker.io/traffic/web-ui@sha256:7ded10737d650ce698dbbcfbeb3595375fac4fe3d9a98d0615fd028ba518eff3
        imagePullPolicy: Never
        ports: [{containerPort: 80}]
        lifecycle:
          preStop:
            exec: {command: ["/bin/sh", "-c", "sleep 10"]}
        env:
        - {name: API_BASE_URL, value: "/api"}
        - {name: API_BACKEND_HOST, value: "apisix.gateway.svc"}
        - {name: API_BACKEND_PORT, value: "9080"}
        - {name: WS_URL, value: "/ws/events"}
        - {name: WS_BACKEND_HOST, value: "apisix.gateway.svc"}
        - {name: WS_BACKEND_PORT, value: "9080"}
        - {name: VITE_ENABLE_WEBSOCKET, value: "true"}
        - {name: ENABLE_REALTIME, value: "true"}
        - {name: AUTH_ENABLED, value: "true"}
        - {name: USE_MOCK, value: "false"}
        - {name: ALERT_DETAIL_API_ENABLED, value: "false"}
        - {name: SCREEN_ACCESS_MODE, value: "protected"}
        - {name: DESKTOP_SMOKE_TOKEN_ENABLED, value: "true"}
        resources: {requests: {cpu: 100m, memory: 128Mi, ephemeral-storage: 128Mi}, limits: {cpu: 500m, memory: 512Mi, ephemeral-storage: 512Mi}}
        livenessProbe:  {httpGet: {path: /, port: 80}, initialDelaySeconds: 10, periodSeconds: 15}
        readinessProbe: {httpGet: {path: /, port: 80}, initialDelaySeconds: 5, periodSeconds: 10}
