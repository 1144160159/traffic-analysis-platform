spec:
  replicas: 1
  selector: {matchLabels: {app: auth-service}}
  template:
    metadata:
      labels: {app: auth-service}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "9092"}
    spec:
      securityContext: {fsGroup: 1000, fsGroupChangePolicy: OnRootMismatch}
      containers:
      - name: auth-service
        image: docker.io/traffic/auth-service@sha256:dbaba705c7309a36e3e8cac8aa4dbd1ff06794afcd3e72e33fa963a9bd5823b5
        imagePullPolicy: Never
        ports: [{containerPort: 8081}, {containerPort: 9092}]
        env:
        - {name: SERVER_LISTEN_ADDR, value: ":8081"}
        - {name: POSTGRES_HOST, value: "postgres-primary.databases.svc"}
        - {name: POSTGRES_PORT, value: "5432"}
        - {name: POSTGRES_DATABASE, value: "traffic_platform"}
        - {name: POSTGRES_USERNAME, value: "postgres"}
        - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: PG_PASSWORD}}}
        - {name: REDIS_ENABLED, value: "true"}
        - {name: REDIS_SENTINEL_ADDRS, value: "redis-sentinel.databases.svc:26379"}
        - {name: REDIS_SENTINEL_MASTER, value: "mymaster"}
        - {name: KAFKA_BROKERS, value: "kafka-bootstrap.middleware.svc:9092"}
        - {name: KAFKA_SECURITY_PROTOCOL, value: "SASL_SSL"}
        - {name: KAFKA_SASL_MECHANISM, value: "SCRAM-SHA-512"}
        - {name: KAFKA_SASL_USERNAME, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_USERNAME}}}
        - {name: KAFKA_SASL_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_PASSWORD}}}
        - {name: KAFKA_TLS_CA_FILE, value: "/etc/kafka/tls/ca.crt"}
        - {name: KAFKA_TLS_SERVER_NAME, value: "kafka-bootstrap.middleware.svc"}
        - {name: OIDC_ENABLED, value: "true"}
        - {name: OIDC_ISSUER_URL, value: "http://10.0.5.8:30180/realms/master"}
        - {name: OIDC_CLIENT_ID, value: "traffic-ui"}
        - {name: OIDC_CLIENT_SECRET, valueFrom: {secretKeyRef: {name: traffic-credentials, key: OIDC_CLIENT_SECRET}}}
        - {name: OIDC_REDIRECT_URL, value: "http://10.0.5.8:30180/api/v1/auth/oidc/callback"}
        - {name: JWT_SIGNING_KEY, valueFrom: {secretKeyRef: {name: traffic-credentials, key: JWT_SECRET}}}
        - {name: LOG_LEVEL, value: "info"}
        resources: {requests: {cpu: 200m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
        livenessProbe:  {httpGet: {path: /health, port: 8081}, initialDelaySeconds: 10, periodSeconds: 15}
        readinessProbe: {httpGet: {path: /health/ready, port: 8081}, initialDelaySeconds: 5, periodSeconds: 10}
        volumeMounts:
        - {name: kafka-client-tls, mountPath: /etc/kafka/tls, readOnly: true}
        - {name: audit-backup, mountPath: /var/log/audit}
