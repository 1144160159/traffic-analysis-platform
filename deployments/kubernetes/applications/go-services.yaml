# ---- Alert Service (HTTP 8082, Metrics 9093) ----
apiVersion: v1
kind: Service
metadata: {name: alert-service, namespace: traffic-analysis, labels: {app: alert-service}}
spec:
  selector: {app: alert-service}
  ports:
  - {name: http, port: 8082}
  - {name: metrics, port: 9093}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: traffic-analysis
  annotations:
    kubernetes.io/change-cause: "Probe management real operations and canonical UI fixture r219"
    traffic.analysis/source-revision: "worktree-20260716"
spec:
  replicas: 1
  selector: {matchLabels: {app: alert-service}}
  template:
    metadata:
      labels: {app: alert-service}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "9093", traffic.analysis/build-id: "probe-topology-api-svg-20260716-r225-worktree"}
    spec:
      terminationGracePeriodSeconds: 120
      containers:
      - name: alert-service
        image: docker.io/traffic/alert-service:data-quality-daily-report-api-20260716-r229
        imagePullPolicy: Never
        ports: [{containerPort: 8082}, {containerPort: 9093}]
        lifecycle:
          preStop:
            exec: {command: ["/bin/sh", "-c", "sleep 10"]}
        env:
        - {name: API_LISTEN_ADDR, value: ":8082"}
        - {name: KAFKA_BROKERS, value: "kafka-bootstrap.middleware.svc:9092"}
        - {name: KAFKA_SECURITY_PROTOCOL, value: "SASL_SSL"}
        - {name: KAFKA_SASL_MECHANISM, value: "SCRAM-SHA-512"}
        - {name: KAFKA_SASL_USERNAME, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_USERNAME}}}
        - {name: KAFKA_SASL_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_PASSWORD}}}
        - {name: KAFKA_TLS_CA_FILE, value: "/etc/kafka/tls/ca.crt"}
        - {name: KAFKA_TLS_SERVER_NAME, value: "kafka-bootstrap.middleware.svc"}
        - {name: CLICKHOUSE_HOSTS, value: "clickhouse-1.middleware.svc:9000,clickhouse-2.middleware.svc:9000"}
        - {name: CLICKHOUSE_DATABASE, value: "traffic"}
        - {name: CLICKHOUSE_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: CLICKHOUSE_PASSWORD}}}
        - {name: CLICKHOUSE_MAX_OPEN_CONNS, value: "32"}
        - {name: CLICKHOUSE_MAX_IDLE_CONNS, value: "16"}
        - {name: REDIS_SENTINEL_ADDRS, value: "redis-sentinel.databases.svc:26379"}
        - {name: REDIS_SENTINEL_MASTER, value: "mymaster"}
        - {name: AUTH_POSTGRES_HOST, value: "postgres-primary.databases.svc"}
        - {name: AUTH_POSTGRES_PORT, value: "5432"}
        - {name: AUTH_POSTGRES_DATABASE, value: "traffic_platform"}
        - {name: AUTH_POSTGRES_USERNAME, value: "postgres"}
        - {name: AUTH_POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: PG_PASSWORD}}}
        - {name: OPENSEARCH_ADDRS, value: "http://opensearch.middleware.svc:9200"}
        - {name: OPENSEARCH_USERNAME, value: "admin"}
        - {name: OPENSEARCH_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: OPENSEARCH_ADMIN_PASSWORD}}}
        - {name: JWT_SECRET_KEY, valueFrom: {secretKeyRef: {name: traffic-credentials, key: JWT_SECRET}}}
        - {name: LOG_LEVEL, value: "info"}
        resources: {requests: {cpu: 500m, memory: 512Mi, ephemeral-storage: 128Mi}, limits: {cpu: "1", memory: 1Gi, ephemeral-storage: 512Mi}}
        livenessProbe:  {httpGet: {path: /health, port: 8082}, initialDelaySeconds: 10, periodSeconds: 15}
        readinessProbe: {httpGet: {path: /ready, port: 8082}, initialDelaySeconds: 5, periodSeconds: 10}
        volumeMounts:
        - {name: kafka-client-tls, mountPath: /etc/kafka/tls, readOnly: true}
      volumes:
      - {name: kafka-client-tls, secret: {secretName: kafka-client-tls, optional: false}}
