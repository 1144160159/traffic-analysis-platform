---
# Go 控制面服务 — 8 个微服务
# 依赖：Kafka(middleware), ClickHouse(middleware), PG(databases), Redis(databases)
---
# ---- Ingest Gateway (gRPC 50051, Management HTTP 8080, Metrics 9091) ----
apiVersion: v1
kind: Service
metadata: {name: ingest-gateway, namespace: traffic-analysis, labels: {app: ingest-gateway}}
spec:
  type: ClusterIP
  selector: {app: ingest-gateway}
  ports:
  - {name: grpc, port: 50051, targetPort: 50051}
  - {name: management, port: 8080, targetPort: 8080}
  - {name: metrics, port: 9091, targetPort: 9091}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-gateway
  namespace: traffic-analysis
  annotations:
    kubernetes.io/change-cause: "Kafka DLQ security fail-closed r3 from e3316aec worktree"
spec:
  replicas: 2
  selector: {matchLabels: {app: ingest-gateway}}
  template:
    metadata:
      labels: {app: ingest-gateway}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "9091", traffic.analysis/build-id: "kafka-security-20260712-r3-worktree"}
    spec:
      initContainers:
      - name: init-dlq-fallback-dir
        image: docker.io/traffic/ingest-gateway@sha256:7e5895b2402581820859acbf48c5a0a532237ab2352826cfcf199d0c2a1f5d0a
        imagePullPolicy: Never
        command: ["sh", "-c", "mkdir -p /var/log/ingest-gateway/dlq-fallback && chown -R 1000:1000 /var/log/ingest-gateway"]
        securityContext: {runAsUser: 0, runAsGroup: 0}
        volumeMounts:
        - {name: dlq-fallback, mountPath: /var/log/ingest-gateway}
      containers:
      - name: ingest-gateway
        image: docker.io/traffic/ingest-gateway@sha256:7e5895b2402581820859acbf48c5a0a532237ab2352826cfcf199d0c2a1f5d0a
        imagePullPolicy: Never
        ports: [{containerPort: 50051}, {containerPort: 8080}, {containerPort: 9091}]
        env:
        - {name: GRPC_ADDR, value: ":50051"}
        - {name: HEALTH_ADDR, value: ":8080"}
        - {name: METRICS_ADDR, value: ":9091"}
        - {name: KAFKA_BROKERS, value: "kafka-bootstrap.middleware.svc:9092"}
        - {name: KAFKA_SECURITY_PROTOCOL, value: "SASL_SSL"}
        - {name: KAFKA_SASL_MECHANISM, value: "SCRAM-SHA-512"}
        - {name: KAFKA_SASL_USERNAME, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_USERNAME}}}
        - {name: KAFKA_SASL_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: KAFKA_CLIENT_PASSWORD}}}
        - {name: KAFKA_TLS_CA_FILE, value: "/etc/kafka/tls/ca.crt"}
        - {name: KAFKA_TLS_SERVER_NAME, value: "kafka-bootstrap.middleware.svc"}
        - {name: REDIS_SENTINEL_ADDRS, value: "redis-sentinel.databases.svc:26379"}
        - {name: REDIS_SENTINEL_MASTER, value: "mymaster"}
        - {name: POSTGRES_HOST, value: "postgres-primary.databases.svc"}
        - {name: POSTGRES_PORT, value: "5432"}
        - {name: POSTGRES_DATABASE, value: "traffic_platform"}
        - {name: POSTGRES_USERNAME, value: "postgres"}
        - {name: POSTGRES_PASSWORD, valueFrom: {secretKeyRef: {name: traffic-credentials, key: PG_PASSWORD}}}
        - {name: JWT_SIGNING_KEY, valueFrom: {secretKeyRef: {name: traffic-credentials, key: JWT_SECRET}}}
        - {name: REQUIRE_MTLS, value: "true"}
        - {name: TLS_CA_FILE, value: "/etc/ingest-gateway/certs/ca-cert.pem"}
        - {name: TLS_CERT_FILE, value: "/etc/ingest-gateway/certs/server-cert.pem"}
        - {name: TLS_KEY_FILE, value: "/etc/ingest-gateway/certs/server-key.pem"}
        - {name: LOG_LEVEL, value: "info"}
        resources: {requests: {cpu: "1", memory: 512Mi}, limits: {cpu: "2", memory: 1Gi}}
        livenessProbe:  {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 10, periodSeconds: 15}
        readinessProbe: {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 5, periodSeconds: 10}
        volumeMounts:
        - {name: certs, mountPath: /etc/ingest-gateway/certs, readOnly: true}
        - {name: kafka-client-tls, mountPath: /etc/kafka/tls, readOnly: true}
        - {name: dlq-fallback, mountPath: /var/log/ingest-gateway}
      volumes:
      - {name: certs, secret: {secretName: ingest-gateway-certs, optional: false}}
      - {name: kafka-client-tls, secret: {secretName: kafka-client-tls, optional: false}}
      - {name: dlq-fallback, emptyDir: {}}
---
# ---- Auth Service (HTTP 8081, Metrics 9092) ----
apiVersion: v1
kind: Service
metadata: {name: auth-service, namespace: traffic-analysis, labels: {app: auth-service}}
spec:
  selector: {app: auth-service}
  ports:
  - {name: http, port: 8081}
  - {name: metrics, port: 9092}
