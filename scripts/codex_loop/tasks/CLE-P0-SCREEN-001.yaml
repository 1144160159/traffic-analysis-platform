id: CLE-P0-SCREEN-001
title: /screen 只读 token 或脱敏公开边界
priority: P0
status: DISCOVERED
lane:
  primary: UI Rebuild
  dependent:
    - Deploy / SRE / Security
    - Product Design
source:
  - "doc/05_status/代码实证状态核对-2026-06-19.md#5"
  - "doc/03_review/专家深评整改清单.md#SUB-FS-01"
acceptance_type: regression
subsystems:
  - web/ui
  - go/control-plane/internal/auth
risk:
  level: high
  reasons:
    - screen can expose operational data
execution:
  mode: local
  allow_live_write: false
workspace:
  allowed_paths:
    - web/ui/src/
    - web/ui/e2e/
    - go/control-plane/internal/auth/
    - doc/02_acceptance/
contracts:
  proto: false
  kafka_topics: false
  database_schema: false
  apisix_routes: false
data_plan:
  mode: live_existing
  tenant: default
  cleanup: none
verification:
  local:
    - tests/run_tests.sh web
  live_readonly:
    - "curl --noproxy '*' http://10.0.5.8:30180/login"
review:
  required: true
  perspectives:
    - code_correctness
    - product_logic
    - technical_design
    - acceptance_evidence
  design_update_allowed:
    - doc/01_design/
    - doc/02_acceptance/
    - doc/05_status/
evidence:
  run_dir: "doc/02_acceptance/runs/${run_id}"
  required:
    - run-summary.json
    - plan.md
    - local-report.md
    - review-report.md
    - evidence-report.md
close_when:
  - /screen has exactly one public/protected/readonly strategy
  - unauthorized behavior is verified
  - sensitive data display policy is documented
