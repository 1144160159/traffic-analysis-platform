id: CLE-P0-UIBACKUP-001
title: 备份现有 web/ui 并生成旧前端清单
priority: P0
status: DISCOVERED
lane:
  primary: UI Rebuild
  dependent:
    - Product Design
source:
  - "doc/01_design/自动开发Loop引擎设计.md#3.3"
acceptance_type: regression
subsystems:
  - web/ui
  - doc/02_acceptance
risk:
  level: medium
  reasons:
    - front-end rebuild must preserve rollback path
execution:
  mode: backup
  allow_live_write: false
workspace:
  allowed_paths:
    - web/ui/
    - doc/02_acceptance/
    - scripts/codex_loop/
contracts:
  proto: false
  kafka_topics: false
  database_schema: false
  apisix_routes: false
data_plan:
  mode: live_existing
  tenant: default
  cleanup: none
verification:
  local:
    - cd web/ui && npm run build
  live_readonly:
    - "curl --noproxy '*' http://10.0.5.8:30180/login"
review:
  required: true
  perspectives:
    - code_correctness
    - product_logic
    - technical_design
    - acceptance_evidence
  design_update_allowed:
    - doc/01_design/
    - doc/02_acceptance/
    - doc/05_status/
evidence:
  run_dir: "doc/02_acceptance/runs/${run_id}"
  required:
    - run-summary.json
    - plan.md
    - local-report.md
    - review-report.md
    - evidence-report.md
close_when:
  - web/ui git status is captured before changes
  - package version and build command are recorded
  - rollback path is documented
