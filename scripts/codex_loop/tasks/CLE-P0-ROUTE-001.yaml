id: CLE-P0-ROUTE-001
title: routeManifest 统一菜单、路由、权限、验收点
priority: P0
status: DISCOVERED
lane:
  primary: UI Rebuild
  dependent:
    - Product Design
    - Deploy / SRE / Security
source:
  - "doc/05_status/代码实证状态核对-2026-06-19.md#6"
  - "doc/03_review/专家深评整改清单.md#SUB-UI-02"
acceptance_type: regression
subsystems:
  - web/ui
  - deployments/kubernetes/configmaps
risk:
  level: medium
  reasons:
    - touches auth boundary
    - touches route visibility
execution:
  mode: local
  allow_live_write: false
workspace:
  allowed_paths:
    - web/ui/src/
    - web/ui/e2e/
    - doc/02_acceptance/
    - doc/01_design/
contracts:
  proto: false
  kafka_topics: false
  database_schema: false
  apisix_routes: true
data_plan:
  mode: live_existing
  tenant: default
  cleanup: none
verification:
  local:
    - tests/run_tests.sh web
  live_readonly:
    - "curl --noproxy '*' http://10.0.5.8:30180/login"
review:
  required: true
  perspectives:
    - code_correctness
    - product_logic
    - technical_design
    - acceptance_evidence
  design_update_allowed:
    - doc/01_design/
    - doc/02_acceptance/
    - doc/05_status/
evidence:
  run_dir: "doc/02_acceptance/runs/${run_id}"
  required:
    - run-summary.json
    - plan.md
    - local-report.md
    - review-report.md
    - evidence-report.md
close_when:
  - "menu, route and breadcrumb derive from one manifest"
  - all six primary groups and twenty-four secondary routes are represented
  - unauthorized routes have explicit behavior
  - route matrix evidence exists
