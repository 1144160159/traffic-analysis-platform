profiles:
  conservative:
    description: Default single-worker profile for repo-local production supervision.
    max_concurrent_workers: 1
    max_items_per_cycle: 1
    interval_seconds: 300
    lease_seconds: 1800
    worker_stage: prepare
    max_failures: 3
    allow_live_write: false
    allow_external_codex: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: repo-json
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    queue_path: doc/02_acceptance/runs/.loop/queue.json
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
  local_burst:
    description: Local-only faster profile for supervised dry-run evidence generation.
    max_concurrent_workers: 1
    max_items_per_cycle: 2
    interval_seconds: 60
    lease_seconds: 900
    worker_stage: prepare
    max_failures: 2
    allow_live_write: false
    allow_external_codex: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: repo-json
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    queue_path: doc/02_acceptance/runs/.loop/queue.json
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
  sqlite_conservative:
    description: Transactional queue profile for local production supervision.
    max_concurrent_workers: 1
    max_items_per_cycle: 1
    interval_seconds: 300
    lease_seconds: 1800
    worker_stage: prepare
    max_failures: 3
    allow_live_write: false
    allow_external_codex: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: sqlite
    queue_path: doc/02_acceptance/runs/.loop/queue.sqlite3
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
  sqlite_pool_plan:
    description: Bounded executor-pool profile for isolated sandbox-plan generation.
    executor_entry: executor_pool
    runner: sandbox-plan
    max_concurrent_workers: 2
    max_items_per_cycle: 2
    interval_seconds: 300
    lease_seconds: 1800
    worker_stage: prepare
    max_failures: 2
    allow_live_write: false
    allow_external_codex: false
    allow_parallel_execution: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: sqlite
    queue_path: doc/02_acceptance/runs/.loop/queue.sqlite3
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
  queue_service_sqlite:
    description: HTTP queue service profile backed by the SQLite/WAL persistent queue.
    executor_entry: queue_service
    runner: queue-service
    max_concurrent_workers: 1
    max_items_per_cycle: 0
    interval_seconds: 300
    lease_seconds: 1800
    worker_stage: prepare
    max_failures: 3
    allow_live_write: false
    allow_external_codex: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: sqlite
    queue_path: doc/02_acceptance/runs/.loop/queue.sqlite3
    queue_service_host: 127.0.0.1
    queue_service_k8s_host: 0.0.0.0
    queue_service_port: 8765
    queue_service_auth_token_env: CODEX_LOOP_QUEUE_TOKEN
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
  http_queue_worker_k8s:
    description: Remote worker profile that claims queue items through the HTTP queue service.
    executor_entry: service
    runner: workflow
    max_concurrent_workers: 1
    max_items_per_cycle: 1
    interval_seconds: 300
    lease_seconds: 1800
    worker_stage: prepare
    max_failures: 3
    allow_live_write: false
    allow_external_codex: false
    create_worktrees: false
    activate_workspaces: false
    queue_backend: http
    queue_path: http://codex-loop-queue-service.traffic-analysis.svc:8765
    state_backend: repo-json
    evidence_root: doc/02_acceptance/runs
    workspace_lock: doc/02_acceptance/runs/.locks/workspace.lock
    preflight_policy: scripts/codex_loop/policies/runtime-preflight.yaml
    sandbox_policy: scripts/codex_loop/policies/execution-sandbox.yaml
    quota_policy: scripts/codex_loop/policies/resource-quotas.yaml
    resource_observability_policy: scripts/codex_loop/policies/resource-observability.yaml
    workspace_isolation_policy: scripts/codex_loop/policies/workspace-isolation.yaml
    min_free_disk_mb: 512
    min_available_memory_mb: 256
