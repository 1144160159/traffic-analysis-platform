verification:
  local:
    - python scripts/codex_loop/plan.py --task scripts/codex_loop/templates/task.yaml
  live_readonly:
    - curl --noproxy '*' http://10.0.5.8:30180/login
review:
  required: true
  perspectives:
    - code_correctness
    - product_logic
    - technical_design
    - acceptance_evidence
