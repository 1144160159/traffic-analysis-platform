apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-loop-queue-service
  namespace: traffic-analysis
  labels:
    app.kubernetes.io/name: codex-loop
    app.kubernetes.io/component: queue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: codex-loop
      app.kubernetes.io/component: queue-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codex-loop
        app.kubernetes.io/component: queue-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: queue-service
          image: {image}
          imagePullPolicy: IfNotPresent
          workingDir: {app_root}
          command:
{k8s_command_yaml}
          ports:
            - name: http
              containerPort: {queue_service_port}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "{cpu_request}"
              memory: "{memory_request}"
            limits:
              cpu: "{cpu_limit}"
              memory: "{memory_limit}"
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: CODEX_LOOP_REPO_ROOT
              value: "{app_root}"
            - name: CODEX_LOOP_SCRIPT_ROOT
              value: "{script_root}"
            - name: CODEX_LOOP_RUNS_ROOT
              value: "{runs_root}"
            - name: CODEX_LOOP_QUEUE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-loop-queue-token
                  key: token
          volumeMounts:
            - name: workspace
              mountPath: {state_root}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: codex-loop-workspace
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
